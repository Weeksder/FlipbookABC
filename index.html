        tracingStrokes = tracingStrokes.filter(s => {
          // Check if stroke segment is near the erase path
          const mx = (s.x1 + s.x2) / 2, my = (s.y1 + s.y2) / 2;
          const dx1 = s.x1 - x1, dy1 = s.y1 - y1;
          const dx2 = s.x2 - x1, dy2 = s.y2 - y1;
          const dist1 = Math.sqrt(dx1*dx1 + dy1*dy1);
          const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
          const distM = Math.sqrt((mx-x1)*(mx-x1) + (my-y1)*(my-y1));
          return dist1 > eraseR && dist2 > eraseR && distM > eraseR;
        });
        if (tracingStrokes.length !== prevLen) replayStrokes();
      } else {
        const color = tracingColors[tracingColorIdx % tracingColors.length];
        tracingStrokes.push({ x1, y1, x2, y2, color });
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = color;
        ctx.lineWidth   = 18;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.globalAlpha = 0.82;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Show clear button after first draw stroke
        const clearBtn = document.getElementById('tracingEraseBtn');
        if (clearBtn && clearBtn.style.display === 'none') clearBtn.style.display = 'inline-flex';
      }
    }

    // ── Tracing word list (manual) ─────────────────────────────────────────
    let tracingWordList  = [];   // all words in the session
    let tracingWordIndex = 0;    // currently active word index

    function updateWheelDisplay() {
      // Button label is always "Select" — no dynamic text needed
    }

    function setTracingWordFromList(idx) {
      if (tracingWordList.length === 0) return;
      tracingWordIndex = (idx + tracingWordList.length) % tracingWordList.length;
      const word = tracingWordList[tracingWordIndex];
      tracingWord = word.toLowerCase().replace(/[^a-z]/g, '').slice(0, 6);
      if (tracingMode !== 'alphabet') {
        const inp = document.getElementById('tracingWordInput');
        if (inp) inp.value = tracingWord;
      }
      updateWheelDisplay();
      drawTracingPage();
    }

    function tracingNavFlash(dir) {
      tracingNavShuffled(dir);
      const id = dir === -1 ? 'tracingFlashLeft' : 'tracingFlashRight';
      const el = document.getElementById(id);
      if (!el) return;
      el.style.transition = 'none';
      el.style.opacity = '0';
      el.getBoundingClientRect(); // force reflow
      el.style.transition = 'opacity 0.08s ease-out';
      el.style.opacity = '1';
      setTimeout(() => {
        el.style.transition = 'opacity 0.28s ease-in';
        el.style.opacity = '0';
      }, 100);
    }

    function tracingNav(dir) {
      if (tracingMode === 'alphabet') {
        alphabetIndex = (alphabetIndex + dir + ALPHABET_LIST.length) % ALPHABET_LIST.length;
        tracingWord = ALPHABET_LIST[alphabetIndex];
        updateWheelDisplay();
        randomTracingColor();
        drawTracingPage();
      } else {
        if (tracingWordList.length === 0) return;
        randomTracingColor();
        setTracingWordFromList(tracingWordIndex + dir);
      }
    }

    // ── Manual Word Panel ──────────────────────────────────────────────────
    let pendingManualWords = [];

    function switchToManualMode() {
      if (tracingMode !== 'manual') {
        tracingMode = 'manual';
        updateTracingModeButtons('manual');
        if (tracingWordList.length > 0) {
          randomTracingColor();
          setTracingWordFromList(tracingWordIndex);
        } else {
          tracingWord = '';
          const inp = document.getElementById('tracingWordInput');
          if (inp) { inp.value = ''; }
          updateWheelDisplay();
          drawTracingPage();
        }
      }
      // Panel only opens via the + button
    }

    function openManualWordPanel() {
      // pendingManualWords retains its own state — never overwritten by alphabet mode
      renderManualList();
      document.getElementById('manualWordPanel').style.display = 'flex';
      document.getElementById('manualWordEntry').value = '';
      setTimeout(() => document.getElementById('manualWordEntry').focus(), 100);
    }

    function closeManualWordPanel() {
      document.getElementById('manualWordPanel').style.display = 'none';
    }

    function addManualWord() {
      const inp = document.getElementById('manualWordEntry');
      const word = inp.value.trim().toLowerCase().replace(/[^a-z]/g, '').slice(0, 6);
      if (!word) return;
      pendingManualWords.push(word);
      inp.value = '';
      inp.focus();
      renderManualList();
    }

    function removeManualWord(idx) {
      pendingManualWords.splice(idx, 1);
      renderManualList();
    }

    function renderManualList() {
      const container = document.getElementById('manualWordList');
      if (pendingManualWords.length === 0) {
        container.innerHTML = '<div style="color:#bbb;font-size:0.82rem;text-align:center;padding:12px 0;">No words yet — type one above</div>';
        return;
      }
      container.innerHTML = '';
      pendingManualWords.forEach((word, i) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;background:#f9f4ec;border:1.5px solid #e0d0b8;border-radius:8px;padding:6px 10px;';
        const lbl = document.createElement('span');
        lbl.style.cssText = "flex:1;font-family:'Comic Sans MS', 'Chalkboard SE', cursive;font-size:0.95rem;font-weight:700;color:#5a4a32;";
        lbl.textContent = word;
        const del = document.createElement('button');
        del.style.cssText = 'background:none;border:none;color:#c09080;font-size:1.1rem;cursor:pointer;padding:0 2px;';
        del.textContent = '×';
        del.onclick = () => removeManualWord(i);
        row.appendChild(lbl);
        row.appendChild(del);
        container.appendChild(row);
      });
    }

    // Separate alphabet list — never mixed with manual
    const ALPHABET_LIST = 'abcdefghijklmnopqrstuvwxyz'.split('');
    let tracingMode = 'manual'; // 'manual' | 'alphabet'
    let alphabetIndex = 0;

    function activateAlphabetMode() {
      tracingMode   = 'alphabet';
      alphabetIndex = 0;
      tracingWord   = ALPHABET_LIST[0];
      updateTracingModeButtons('alphabet');
      updateWheelDisplay();
      randomTracingColor();
      drawTracingPage();
    }

    function updateTracingModeButtons(active) {
      const manBtn  = document.getElementById('manualModeBtn');
      const alpBtn  = document.getElementById('alphabetModeBtn');
      const caseBtn = document.getElementById('tracingCaseBtn');
      const wordLbl = document.getElementById('tracingWordLabel');
      const wordInp = document.getElementById('tracingWordInput');
      const wordCnt = null;
      if (!manBtn || !alpBtn) return;

      if (active === 'alphabet') {
        // Alphabet tab: active (elevated, cream)
        alpBtn.style.background  = '#f5ece0';
        alpBtn.style.color       = '#8b6f47';
        alpBtn.style.fontWeight  = '700';
        alpBtn.style.zIndex      = '2';
        alpBtn.style.opacity     = '1';
        // DIY tab: inactive (recessed, ghost)
        manBtn.style.background  = 'rgba(255,255,255,0.18)';
        manBtn.style.color       = 'rgba(255,255,255,0.75)';
        manBtn.style.fontWeight  = '500';
        manBtn.style.zIndex      = '1';
        // Hide word input field
        if (wordLbl) wordLbl.style.display = 'none';
        if (wordInp) wordInp.style.display = 'none';
        // Hide case, + and DIY shuffle in alphabet mode; show alpha shuffle
        if (caseBtn) caseBtn.style.display = 'none';
        const addBtn = document.getElementById('tracingAddWordsBtn');
        if (addBtn) addBtn.style.display = 'none';
        const shuffleDIY   = document.getElementById('tracingShuffleDIY');
        const shuffleAlpha = document.getElementById('tracingShuffleAlpha');
        if (shuffleDIY)   shuffleDIY.style.display   = 'none';
        if (shuffleAlpha) shuffleAlpha.style.display  = 'flex';
        resetShuffle();
      } else {
        // DIY tab: active (elevated, cream)
        manBtn.style.background  = '#f5ece0';
        manBtn.style.color       = '#8b6f47';
        manBtn.style.fontWeight  = '700';
        manBtn.style.zIndex      = '2';
        manBtn.style.opacity     = '1';
        // Alphabet tab: inactive (recessed, ghost)
        alpBtn.style.background  = 'rgba(255,255,255,0.18)';
        alpBtn.style.color       = 'rgba(255,255,255,0.75)';
        alpBtn.style.fontWeight  = '500';
        alpBtn.style.zIndex      = '1';
        // Show word input field
        if (wordLbl) wordLbl.style.display = '';
        if (wordInp) wordInp.style.display = '';
        // Show case and + buttons in DIY mode; show DIY shuffle, hide alpha shuffle
        if (caseBtn) { caseBtn.style.display = ''; caseBtn.disabled = false; caseBtn.style.opacity = '1'; caseBtn.style.cursor = 'pointer'; }
        const addBtn = document.getElementById('tracingAddWordsBtn');
        if (addBtn) addBtn.style.display = 'flex';
        const shuffleDIY2   = document.getElementById('tracingShuffleDIY');
        const shuffleAlpha2 = document.getElementById('tracingShuffleAlpha');
        if (shuffleDIY2)   shuffleDIY2.style.display  = tracingWordList.length > 0 ? 'flex' : 'none';
        if (shuffleAlpha2) shuffleAlpha2.style.display = 'none';
        resetShuffle();
      }
    }

    function copyManualWords() {
      if (pendingManualWords.length === 0) return;
      const text = pendingManualWords.join(', ');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('manualCopyBtn');
        const orig = btn.textContent;
        btn.textContent = '✓ Copied!';
        btn.style.background = '#d4f0d4';
        btn.style.borderColor = '#4CAF50';
        btn.style.color = '#2e7d32';
        setTimeout(() => {
          btn.textContent = orig;
          btn.style.background = '#f0e8dc';
          btn.style.borderColor = '#c8b89a';
          btn.style.color = '#8b6f47';
        }, 1800);
      }).catch(() => {
        // Fallback for browsers that block clipboard API
        const ta = document.createElement('textarea');
        ta.value = pendingManualWords.join(', ');
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Copied to clipboard!\n\n' + pendingManualWords.join(', '));
      });
    }

    function loadWordFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const raw = e.target.result;
        // Accept one word per line OR comma-separated (same as paste import)
        const imported = raw
          .split(/[\n,]+/)
          .map(w => w.trim().replace(/[^a-zA-Z]/g, '').slice(0, 6))
          .filter(w => w.length > 0);
        if (imported.length === 0) {
          alert('No valid words found in file.\n\nExpected one word per line or comma-separated.');
          input.value = '';
          return;
        }
        // Merge without duplicates (case-insensitive)
        imported.forEach(w => {
          if (!pendingManualWords.some(p => p.toLowerCase() === w.toLowerCase())) {
            pendingManualWords.push(w);
          }
        });
        renderManualList();
        input.value = ''; // reset so same file can be loaded again
      };
      reader.readAsText(file);
    }

    function showManualPasteArea() {
      const area = document.getElementById('manualPasteArea');
      const isVisible = area.style.display !== 'none';
      area.style.display = isVisible ? 'none' : 'flex';
      if (!isVisible) {
        document.getElementById('manualPasteInput').focus();
        // Scroll the panel so Import button is visible
        setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      }
    }

    function importPastedWords() {
      const raw = document.getElementById('manualPasteInput').value.trim();
      if (!raw) return;

      // Split on commas OR newlines (or both), trim each token
      const imported = raw
        .split(/[\n,]+/)
        .map(w => w.trim().replace(/[^a-zA-Z]/g, '').slice(0, 6))
        .filter(w => w.length > 0);

      if (imported.length === 0) {
        alert('No valid words found.\n\nFormat: one per line, or comma-separated.');
        return;
      }

      // Merge without duplicates (case-insensitive check)
      imported.forEach(w => {
        if (!pendingManualWords.some(p => p.toLowerCase() === w.toLowerCase())) {
          pendingManualWords.push(w);
        }
      });

      document.getElementById('manualPasteInput').value = '';
      document.getElementById('manualPasteArea').style.display = 'none';
      renderManualList();
    }

    function confirmManualWords() {
      if (pendingManualWords.length === 0) return;
      tracingMode      = 'manual';
      tracingWordList  = [...pendingManualWords];
      tracingWordIndex = 0;
      closeManualWordPanel();
      updateTracingModeButtons('manual');
      randomTracingColor();
      setTracingWordFromList(0);
      // Show shuffle button now that list has words
      const shuffleBtn = document.getElementById('tracingShuffleDIY');
      if (shuffleBtn) shuffleBtn.style.display = 'flex';
    }

    // ── Shuffle ───────────────────────────────────────────────────────────
    let tracingShuffled      = false;
    let tracingShuffledList  = [];
    let tracingShuffledIndex = 0; // position within shuffled list

    const ICON_SHUFFLE   = `<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>`;
    const ICON_UNSHUFFLE = `<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>`;

    function updateShuffleBtn() {
      ['tracingShuffleAlpha','tracingShuffleDIY'].forEach(id => {
        const btn = document.getElementById(id);
        if (!btn) return;
        const svg = btn.querySelector('svg');
        if (!svg) return;
        svg.innerHTML = tracingShuffled ? ICON_UNSHUFFLE : ICON_SHUFFLE;
        svg.setAttribute('stroke', tracingShuffled ? 'white' : '#8b6f47');
        btn.style.background  = tracingShuffled ? '#8b6f47' : 'transparent';
        btn.style.borderColor = '#8b6f47';
      });
    }

    function fisherYates(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function toggleTracingShuffle() {
      tracingShuffled = !tracingShuffled;
      if (tracingShuffled) {
        const src = tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList;
        tracingShuffledList = fisherYates(src);
        tracingShuffledIndex = 0;
        const word = tracingShuffledList[0];
        if (tracingMode === 'alphabet') {
          tracingWord   = word;
          alphabetIndex = ALPHABET_LIST.indexOf(word);
        } else {
          const origIdx = tracingWordList.indexOf(word);
          tracingWordIndex = origIdx >= 0 ? origIdx : 0;
          tracingWord = tracingWordList[tracingWordIndex];
          const inp = document.getElementById('tracingWordInput');
          if (inp) inp.value = tracingWord;
        }
        updateWheelDisplay();
        randomTracingColor();
        drawTracingPage();
      } else {
        tracingShuffledList  = [];
        tracingShuffledIndex = 0;
      }
      updateShuffleBtn();
    }

    function resetShuffle() {
      tracingShuffled      = false;
      tracingShuffledList  = [];
      tracingShuffledIndex = 0;
      updateShuffleBtn();
    }

    // Wrap tracingNav to follow shuffled order when active
    const _origNav = window.tracingNav;
    function tracingNavShuffled(dir) {
      if (!tracingShuffled || tracingShuffledList.length === 0) {
        tracingNav(dir);
        return;
      }
      tracingShuffledIndex = (tracingShuffledIndex + dir + tracingShuffledList.length) % tracingShuffledList.length;
      const word = tracingShuffledList[tracingShuffledIndex];
      if (tracingMode === 'alphabet') {
        tracingWord   = word;
        alphabetIndex = ALPHABET_LIST.indexOf(word);
      } else {
        const origIdx = tracingWordList.indexOf(word);
        tracingWordIndex = origIdx >= 0 ? origIdx : 0;
        tracingWord = tracingWordList[tracingWordIndex];
      }
      updateWheelDisplay();
      randomTracingColor();
      drawTracingPage();
    }

    // ── Draggable tool toggle ──────────────────────────────────────────────
    (function() {
      let dragging = false, startX, startY, origLeft, origTop;

      function getNotebook() { return document.getElementById('tracingNotebook'); }

      function onDragStart(e) {
        const toggle = document.getElementById('tracingToolToggle');
        const notebook = getNotebook();
        if (!toggle || !notebook) return;
        dragging = true;
        toggle.style.cursor = 'grabbing';
        const client = e.touches ? e.touches[0] : e;
        startX = client.clientX;
        startY = client.clientY;
        origLeft = parseInt(toggle.style.left) || 50;
        origTop  = parseInt(toggle.style.top)  || 10;
        e.preventDefault();
        e.stopPropagation();
      }

      function onDragMove(e) {
        if (!dragging) return;
        const toggle = document.getElementById('tracingToolToggle');
        const notebook = getNotebook();
        if (!toggle || !notebook) return;
        const client = e.touches ? e.touches[0] : e;
        const dx = client.clientX - startX;
        const dy = client.clientY - startY;
        const nb = notebook.getBoundingClientRect();
        const tw = toggle.offsetWidth;
        const th = toggle.offsetHeight;
        const newLeft = Math.max(0, Math.min(origLeft + dx, nb.width  - tw));
        const newTop  = Math.max(0, Math.min(origTop  + dy, nb.height - th));
        toggle.style.left = newLeft + 'px';
        toggle.style.top  = newTop  + 'px';
        e.preventDefault();
        e.stopPropagation();
      }

      function onDragEnd(e) {
        if (!dragging) return;
        dragging = false;
        const toggle = document.getElementById('tracingToolToggle');
        if (toggle) toggle.style.cursor = 'grab';
      }

      function initDrag() {
        const handle = document.getElementById('tracingToolHandle');
        if (!handle) return;
        // Convert bottom-based position to top-based for drag math
        const toggle = document.getElementById('tracingToolToggle');
        const notebook = getNotebook();
        if (toggle && notebook && toggle.style.bottom) {
          const nb = notebook.getBoundingClientRect();
          const th = toggle.offsetHeight;
          const bottom = parseInt(toggle.style.bottom) || 20;
          toggle.style.top    = (nb.height - th - bottom) + 'px';
          toggle.style.bottom = '';
        }
        handle.addEventListener('mousedown',  onDragStart);
        handle.addEventListener('touchstart', onDragStart, { passive: false });
        window.addEventListener('mousemove',  onDragMove);
        window.addEventListener('touchmove',  onDragMove, { passive: false });
        window.addEventListener('mouseup',    onDragEnd);
        window.addEventListener('touchend',   onDragEnd);
      }

      // Init once tracing page opens
      const origOpen = window.openTracingPage;
      window.openTracingPage = function() {
        if (origOpen) origOpen.apply(this, arguments);
        setTimeout(initDrag, 100);
      };
    })();
    const WHEEL_ITEM_H = 44;
    let wheelSnapTimeout  = null;
    let wheelPendingIndex = 0;
    let wheelIsOpen       = false;

    function openScrollWheel() {
      const list = tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList;
      if (list.length === 0) return;
      wheelPendingIndex = tracingMode === 'alphabet' ? alphabetIndex : tracingWordIndex;
      buildWheelItems();
      document.getElementById('scrollWheelOverlay').style.display = 'flex';
      wheelIsOpen = true;
      // Attach mouse wheel listener (passive:false so we can preventDefault)
      document.getElementById('wheelList').addEventListener('wheel', onWheelMouseWheel, { passive: false });
      requestAnimationFrame(() => scrollWheelTo(wheelPendingIndex, false));
    }

    function closeScrollWheel() {
      document.getElementById('scrollWheelOverlay').style.display = 'none';
      document.getElementById('wheelList').removeEventListener('wheel', onWheelMouseWheel);
      wheelIsOpen = false;
    }

    function confirmScrollWheel() {
      if (tracingMode === 'alphabet') {
        alphabetIndex = wheelPendingIndex;
        tracingWord   = ALPHABET_LIST[alphabetIndex];
        updateWheelDisplay();
        randomTracingColor();
        drawTracingPage();
      } else {
        randomTracingColor();
        setTracingWordFromList(wheelPendingIndex);
      }
      closeScrollWheel();
    }

    function buildWheelItems() {
      const container = document.getElementById('wheelItems');
      container.innerHTML = '';
      const list = tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList;
      list.forEach((word, i) => {
        const item = document.createElement('div');
        item.style.cssText = `height:${WHEEL_ITEM_H}px;display:flex;align-items:center;justify-content:center;font-family:'Comic Sans MS', 'Chalkboard SE', cursive;font-size:1.15rem;font-weight:700;color:#5a4a32;cursor:pointer;transition:font-size 0.15s,color 0.15s;`;
        item.textContent = tracingMode === 'alphabet'
          ? word.toUpperCase() + word.toLowerCase()
          : word;
        item.dataset.index = i;
        item.onclick = () => { wheelPendingIndex = i; scrollWheelTo(i, true); };
        container.appendChild(item);
      });
    }

    function scrollWheelTo(idx, animate) {
      const list   = document.getElementById('wheelList');
      const maxIdx = (tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList).length - 1;
      idx = Math.max(0, Math.min(idx, maxIdx));
      wheelPendingIndex = idx;
      const target = idx * WHEEL_ITEM_H;
      list.scrollTo({ top: target, behavior: animate ? 'smooth' : 'instant' });
      highlightWheelItem(idx);
    }

    function highlightWheelItem(idx) {
      document.querySelectorAll('#wheelItems > div').forEach((el, i) => {
        const active = i === idx;
        el.style.fontSize   = active ? '1.3rem' : '1rem';
        el.style.color      = active ? '#8b6f47' : '#a09080';
        el.style.fontWeight = active ? '700' : '400';
      });
    }

    // Native scroll (touch + trackpad) — update highlight live, snap on stop
    function onWheelScroll() {
      const list   = document.getElementById('wheelList');
      const maxIdx = (tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList).length - 1;
      const idx    = Math.max(0, Math.min(Math.round(list.scrollTop / WHEEL_ITEM_H), maxIdx));
      wheelPendingIndex = idx;
      highlightWheelItem(idx);
      clearTimeout(wheelSnapTimeout);
      wheelSnapTimeout = setTimeout(() => scrollWheelTo(idx, true), 150);
    }

    // Mouse wheel — fluid scrolling with momentum, snap on stop
    function onWheelMouseWheel(e) {
      e.preventDefault();
      const list   = document.getElementById('wheelList');
      const delta  = e.deltaY || e.detail || 0;
      // Scale delta so small trackpad gestures feel fluid
      list.scrollTop += delta * 0.8;
      onWheelScroll();
    }

    // Keyboard arrow navigation when picker is open
    document.addEventListener('keydown', function(e) {
      if (!wheelIsOpen) return;
      const list   = tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        scrollWheelTo(Math.min(wheelPendingIndex + 1, list.length - 1), true);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        scrollWheelTo(Math.max(wheelPendingIndex - 1, 0), true);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        confirmScrollWheel();
      } else if (e.key === 'Escape') {
        closeScrollWheel();
      }
    });

    // Hide scrollbar on wheel list
    const wheelStyle = document.createElement('style');
    wheelStyle.textContent = '#wheelList::-webkit-scrollbar{display:none;}';
    document.head.appendChild(wheelStyle);
    window.addEventListener('resize', () => {
      if (document.getElementById('tracingPage').style.display !== 'none') {
        setTimeout(setupTracingCanvas, 100);
      }
    });
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.dropdown')) {
        document.getElementById('dropdownContent').classList.remove('show');
        document.querySelector('.dropdown').classList.remove('active');
      }
      if (!event.target.closest('.settings-dropdown')) {
        document.getElementById('settingsDropdown').classList.remove('open');
      }
    });

    document.addEventListener('touchend', function(event) {
      if (!event.target.closest('.dropdown')) {
        document.getElementById('dropdownContent').classList.remove('show');
        document.querySelector('.dropdown').classList.remove('active');
      }
      if (!event.target.closest('.settings-dropdown')) {
        document.getElementById('settingsDropdown').classList.remove('open');
      }
    });

    // Initial render
    renderCards();

    // Warn before leaving to prevent accidental exits
    window.addEventListener('beforeunload', function(event) {
      // Always show confirmation when trying to leave
      event.preventDefault();
      
      // Custom message based on whether there are photos
      const hasPhotos = Object.keys(wordPhotos).length > 0;
      const confirmationMessage = hasPhotos 
        ? 'You have unsaved photos. Are you sure you want to leave?' 
        : 'Are you sure you want to leave?';
      
      event.returnValue = confirmationMessage;
      return confirmationMessage;
    });

  </script>

  <!-- Portrait orientation overlay -->
  <div id="orientationOverlay" style="
    display: none;
    position: fixed; inset: 0; z-index: 99999;
    background: #4a3728;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #f5e6d3;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 32px;
  ">
    <div style="font-size: 56px; animation: rotateHint 1.5s ease-in-out infinite alternate;">📱</div>
    <div style="font-size: 1.2rem; font-weight: bold;">Please rotate your device</div>
    <div style="font-size: 0.9rem; opacity: 0.75;">This app works best in landscape mode</div>
  </div>
  <style>
    @keyframes rotateHint {
      from { transform: rotate(0deg); }
      to   { transform: rotate(90deg); }
    }
  </style>

  <script>
    (function() {
      function tryLock() {
        try {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
          }
        } catch(e) {}
      }
      function checkOrientation() {
        const overlay = document.getElementById('orientationOverlay');
        if (!overlay) return;
        const isPortrait = window.innerHeight > window.innerWidth;
        overlay.style.display = isPortrait ? 'flex' : 'none';
      }
      tryLock();
      document.addEventListener('click', tryLock, { once: true });
      document.addEventListener('touchstart', tryLock, { once: true });
      window.addEventListener('resize', checkOrientation);
      window.addEventListener('orientationchange', checkOrientation);
      checkOrientation();
    })();
  </script>

</body>
