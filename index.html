<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="landscape">



<title>FlashABC - Notebook Flip Card Builder</title>
<style>
  /* Rotate portrait devices into landscape */
  /* Orientation overlay shown via JS only */

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed;
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
    font-family: Arial, sans-serif;
    touch-action: pan-y; /* Allow vertical scrolling only, no zoom */
    -webkit-user-select: none; /* Prevent text selection */
    user-select: none;
  }

  .container { max-width: 100%; height: 100%; margin: 0 auto; display: flex; flex-direction: column; }
  
  /* Top Bar */
  .top-bar { 
    padding: 15px; 
    display: flex; 
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  /* ── Landscape: sidebar layout ── */
  @media (orientation: landscape) {
    .container {
      flex-direction: row;
    }
    .top-bar {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 12px 8px;
      gap: 12px;
      width: 64px;
      flex-shrink: 0;
      border-right: 1px solid rgba(139,111,71,0.15);
    }
    .cards-container {
      flex: 1;
      width: 0; /* let flex handle it */
    }
    /* Stack dropdown below other buttons */
    .dropdown-content {
      right: auto;
      left: 100%;
      top: 0;
      margin-top: 0;
      margin-left: 5px;
    }
  }

  /* Case Toggle Button */
  .case-toggle-btn {
    font-size: 0.9rem;
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #8b6f47;
    background: transparent;
    color: #8b6f47;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .case-toggle-btn:hover {
    background: #8b6f47;
    color: white;
  }

  /* Dropdown Menu */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-btn {
    padding: 8px; border: none; border-radius: 8px; font-size: 1.5rem;
    font-weight: 600; cursor: pointer; transition: all 0.3s;
    background: transparent; color: #8b6f47; border: 2px solid #8b6f47;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  }
  .dropdown-btn:hover, .dropdown-btn:active, .dropdown.active .dropdown-btn {
    background: #8b6f47; color: white;
  }
  .dropdown-content {
    display: none; position: absolute; right: 0; margin-top: 5px;
    background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    min-width: 160px; z-index: 1100;
  }
  .dropdown-content.show { display: block; }
  .dropdown-content button {
    display: block; width: 100%; padding: 10px 14px; border: none;
    background: white; color: #333; font-size: 0.85rem; font-weight: 600;
    text-align: left; cursor: pointer; transition: background 0.2s;
  }
  .dropdown-content button:first-child { border-radius: 8px 8px 0 0; }
  .dropdown-content button:last-child { border-radius: 0 0 8px 8px; }
  .dropdown-content button:hover { background: #f0f0f0; }

  /*
   * Fluid sizing system — sized to fill the screen like the reference image
   * Cards are near-square (h ≈ 1.15× w) and large enough to dominate the viewport
   */

  /* ── Portrait phone (default baseline) — scaled for 4 cards ── */
  :root {
    --card-w:          21vw;
    --card-h:          24vw;
    --card-font:       12vw;
    --we-font:         7.5vw;
    --wide-mult:       2.2;
    --narrow-mult:     0.65;
    --gap:             0.5vw;
    --stack-h:         24vw;
    --wrapper-pad-top: 26vw;
    --wrapper-pad-x:   2vw;
    --wrapper-pad-bot: 4vw;
    --ring-w:          2.4vw;
    --ring-h:          3.2vw;
    --ring-gap:        1.4vw;
    --binding-top:     -2.2vw;
    --label-bottom:    -3.8vw;
    --label-font:      2.4vw;
    --perspective:     100vw;
  }

  /* ── Landscape phone ── */
  @media (orientation: landscape) and (max-height: 500px) {
    :root {
      --card-w:          26vh;
      --card-h:          30vh;
      --card-font:       17vh;
      --we-font:         11vh;
      --wide-mult:       2.0;
      --gap:             0.75vh;
      --stack-h:         30vh;
      --wrapper-pad-top: 32vh;
      --wrapper-pad-x:   1.5vh;
      --wrapper-pad-bot: 3vh;
      --ring-w:          2.8vh;
      --ring-h:          3.8vh;
      --ring-gap:        1.5vh;
      --binding-top:     -2.5vh;
      --label-bottom:    -4vh;
      --label-font:      2.4vh;
      --perspective:     120vh;
    }
  }

  /* ── Portrait tablet — scaled for 4 cards ── */
  @media (orientation: portrait) and (min-width: 600px) {
    :root {
      --card-w:          21vw;
      --card-h:          24vw;
      --card-font:       12vw;
      --we-font:         7.5vw;
      --wide-mult:       2.2;
      --gap:             0.5vw;
      --stack-h:         24vw;
      --wrapper-pad-top: 26vw;
      --wrapper-pad-x:   2vw;
      --wrapper-pad-bot: 4vw;
      --ring-w:          2.4vw;
      --ring-h:          3.2vw;
      --ring-gap:        1.4vw;
      --binding-top:     -2.2vw;
      --label-bottom:    -3.8vw;
      --label-font:      2.4vw;
      --perspective:     100vw;
    }
  }

  /* ── Landscape tablet (iPad landscape) ── */
  @media (orientation: landscape) and (min-height: 500px) and (max-width: 1400px) {
    :root {
      --card-w:          34vh;
      --card-h:          39vh;
      --card-font:       23vh;
      --we-font:         14vh;
      --wide-mult:       2.1;
      --gap:             1vh;
      --stack-h:         39vh;
      --wrapper-pad-top: 42vh;
      --wrapper-pad-x:   2vh;
      --wrapper-pad-bot: 4vh;
      --ring-w:          3.5vh;
      --ring-h:          4.8vh;
      --ring-gap:        1.8vh;
      --binding-top:     -3.2vh;
      --label-bottom:    -5vh;
      --label-font:      3vh;
      --perspective:     150vh;
    }
  }

  /* ── Large desktop (landscape) ── */
  @media (orientation: landscape) and (min-width: 1400px) {
    :root {
      --card-w:          30vh;
      --card-h:          34vh;
      --card-font:       20vh;
      --we-font:         12.5vh;
      --wide-mult:       2.1;
      --gap:             1vh;
      --stack-h:         34vh;
      --wrapper-pad-top: 37vh;
      --wrapper-pad-x:   2vh;
      --wrapper-pad-bot: 4vh;
      --ring-w:          3.2vh;
      --ring-h:          4.2vh;
      --ring-gap:        1.6vh;
      --binding-top:     -2.8vh;
      --label-bottom:    -4.5vh;
      --label-font:      2.8vh;
      --perspective:     140vh;
    }
  }

  /* Cards Container */
  .cards-container { 
    position: relative; 
    width: 100%; 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center;
    padding: 2vmin;
    gap: 8px; /* Reduced from 20px */
  }
  
  /* Photo Card Container - separate boundary */
  .photo-card-container {
    display: none; /* Hidden by default */
    position: relative;
    z-index: 5;
  }
  
  .photo-card-container.visible {
    display: block;
  }
  
  /* Portrait: Photo above flipbook */
  @media (orientation: portrait) {
    .cards-container {
      flex-direction: column;
      gap: 5px; /* Tighter gap in portrait */
    }
    
    .photo-card-container {
      order: -1; /* Photo first */
    }
  }
  
  /* Landscape: Photo and flipbook side by side */
  @media (orientation: landscape) {
    .cards-container {
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px; /* Tighter gap in landscape */
    }
  }
  
  .cards-wrapper { 
    display: flex;
    gap: var(--gap);
    justify-content: center;
    align-items: flex-start;
    position: relative;
    background: rgba(210, 180, 140, 0.3);
    padding: var(--wrapper-pad-top) var(--wrapper-pad-x) var(--wrapper-pad-bot);
    border-radius: 15px;
    max-width: fit-content;
    overflow: visible;
  }

  /* Individual Card Scene */
  .card-scene {
    perspective: var(--perspective);
    perspective-origin: 50% 0%;
    cursor: pointer;
    user-select: none;
    position: relative;
    overflow: visible;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* Preview card */
  .preview-card {
    position: absolute;
    top: 0; left: 0;
    width: var(--card-w);
    height: var(--card-h);
    background: #fff8ee;
    border: 2px solid #c8b89a;
    border-radius: 6px 6px 10px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--card-font);
    font-weight: 600;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    z-index: 1;
  }

  .preview-card.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .preview-card.narrow {
    width: calc(var(--card-w) * var(--narrow-mult));
  }

  .preview-card.consonant { color: #3b82f6; }
  .preview-card.vowel     { color: #ef4444; }
  .preview-card.word-ending { font-size: var(--we-font); color: #f59e0b; }

  /* Stacked flipped cards */
  .flipped-stack {
    position: absolute;
    top: calc(-1 * var(--stack-h));
    left: 0;
    width: var(--card-w);
    height: var(--stack-h);
    pointer-events: auto;
    z-index: 10;
    cursor: pointer;
  }

  .flipped-stack.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .flipped-stack.narrow {
    width: calc(var(--card-w) * var(--narrow-mult));
  }

  .flipped-card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #fff8ee;
    border: 2px solid #c8b89a;
    border-radius: 6px 6px 10px 10px;
  }

  .notebook {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    transform-origin: top center;
    transform-style: preserve-3d;
    z-index: 5;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: translateZ(0);
  }

  .notebook.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .notebook.narrow {
    width: calc(var(--card-w) * var(--narrow-mult));
  }

  /* Faces */
  .face {
    position: absolute;
    inset: 0;
    border-radius: 6px 6px 10px 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: var(--card-font);
    font-weight: 600;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  }

  .face-front {
    background: #fff8ee;
    border: 2px solid #c8b89a;
  }

  .face-back {
    background: #eef4ff;
    border: 2px solid #a0b4d0;
    transform: rotateX(180deg);
    opacity: 0;
  }

  /* Color Coding */
  .consonant .face-front, .consonant .face-back { color: #3b82f6; }
  .vowel .face-front, .vowel .face-back         { color: #ef4444; }
  .word-ending .face-front, .word-ending .face-back { font-size: var(--we-font); color: #f59e0b; }

  /* Binding Rings */
  .binding {
    position: absolute;
    top: var(--binding-top);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: var(--ring-gap);
    z-index: 10;
    pointer-events: none;
  }

  .ring {
    width: var(--ring-w);
    height: var(--ring-h);
    border: 2.5px solid #8b6f47;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: transparent;
    position: relative;
  }

  .ring::after {
    content: '';
    position: absolute;
    bottom: 0; left: 2px; right: 2px;
    height: 40%;
    border: 2px solid #a0885f;
    border-top: none;
    border-radius: 0 0 50% 50%;
  }

  /* Card Label */
  .card-label {
    position: absolute;
    bottom: var(--label-bottom);
    left: 50%;
    transform: translateX(-50%);
    font-size: var(--label-font);
    font-weight: 700;
    color: #8b6f47;
    text-align: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    gap: 0.35em;
  }

  /* Dot — desktop only */
  @media (pointer: fine) {
    .card-label::before {
      content: '';
      display: inline-block;
      width: 0.45em;
      height: 0.45em;
      border-radius: 50%;
      background: #b0a090;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .card-label.active-card::before {
      background: #4CAF50;
    }
  }

  /* Flipped state */
  .notebook.flipped {
    transform: rotateX(180deg);
  }

  /* Flying card */
  .flying-card {
    position: absolute;
    left: 0;
    width: var(--card-w);
    background: #fff8ee;
    border: 2px solid #c8b89a;
    border-radius: 6px 6px 10px 10px;
    z-index: 50;
    pointer-events: none;
    transform-origin: top center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flying-card.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .flying-card.narrow {
    width: calc(var(--card-w) * var(--narrow-mult));
  }

  .fly-letter {
    font-size: var(--card-font);
    font-weight: 600;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  }

  .flying-card.consonant .fly-letter  { color: #3b82f6; }
  .flying-card.vowel .fly-letter      { color: #ef4444; }
  .flying-card.word-ending .fly-letter { font-size: var(--we-font); color: #f59e0b; }

  /* ── Settings gear ── */
  .settings-dropdown { position: relative; display: inline-block; }

  .settings-btn {
    width: 44px; height: 44px;
    border: 2px solid #8b6f47;
    border-radius: 8px;
    background: transparent;
    color: #8b6f47;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .settings-btn:hover, .settings-dropdown.open .settings-btn {
    background: #8b6f47; color: white;
  }
  .settings-btn svg { pointer-events: none; }

  .settings-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    min-width: 210px;
    z-index: 1100;
    padding: 8px 0 10px;
    overflow: hidden;
  }
  .settings-dropdown.open .settings-panel { display: block; }

  /* In landscape sidebar, open to the right */
  @media (orientation: landscape) {
    .settings-panel {
      top: 0;
      left: calc(100% + 6px);
    }
  }

  .settings-title {
    font-size: 0.65rem;
    font-weight: 700;
    color: #a0885f;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 5px 14px 8px;
    border-bottom: 1px solid #f0e8d8;
    margin-bottom: 3px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    gap: 12px;
  }

  .settings-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #5a4a32;
    white-space: nowrap;
  }

  .settings-toggle-btn {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 14px;
    border: 2px solid #8b6f47;
    background: transparent;
    color: #8b6f47;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    min-width: 46px;
    text-align: center;
  }
  .settings-toggle-btn:hover { background: #f5ece0; }
  .settings-toggle-btn.active {
    background: #8b6f47;
    color: white;
  }

  /* Photo card scene — same dimensions as a regular card */
  .photo-card-scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Slide in/out animation */
    overflow: visible;
  }

  .photo-card {
    width: var(--card-w);
    height: var(--card-h);
    background: #f0f4f0;
    border: 2px dashed #a0b49a;
    border-radius: 6px 6px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5em;
    color: #7a9a74;
    cursor: default;
    user-select: none;
  }

  /* Portrait mode: Make photo card 75% larger */
  @media (orientation: portrait) {
    .photo-card {
      width: calc(var(--card-w) * 1.75);
      height: calc(var(--card-h) * 1.75);
    }
    
    .photo-card-plus {
      font-size: calc(var(--card-font) * 0.55 * 1.75);
    }
    
    .photo-card-label-inner {
      font-size: calc(var(--label-font) * 0.85 * 1.75);
    }
  }

  /* Simple flat paste button - bottom right corner */
  .photo-paste-area {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 25%;
    height: 22%;
    border-left: 2px dashed #a0b49a;
    border-top: 2px dashed #a0b49a;
    background: rgba(122, 154, 116, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
  }

  .photo-paste-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .photo-paste-text {
    font-size: 0.5rem;
    font-weight: 600;
    color: #7a9a74;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Apple device paste input field - visible search bar style */
  .apple-paste-input {
    width: 90%;
    padding: 8px;
    border: 2px solid #a0b49a;
    border-radius: 6px;
    background: white;
    font-size: 0.9rem;
    text-align: center;
    color: #7a9a74;
    outline: none;
    margin-top: 8px;
  }

  .apple-paste-input::placeholder {
    color: #a0b49a;
    font-size: 0.85rem;
  }

  .apple-paste-input:focus {
    border-color: #7a9a74;
    background: #f9fdf9;
  }

  .photo-card-plus {
    font-size: calc(var(--card-font) * 0.55);
    font-weight: 300;
    line-height: 1;
    color: #7a9a74;
  }

  .photo-card-label-inner {
    font-size: calc(var(--label-font) * 0.85);
    font-weight: 600;
    color: #7a9a74;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .photo-drop-target {
    position: relative;
  }
  .photo-drop-target.drag-over::after {
    content: '📷 Drop image here';
    position: absolute;
    inset: 0;
    background: rgba(139, 111, 71, 0.85);
    color: white;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px 6px 10px 10px;
    z-index: 200;
    pointer-events: none;
  }
    left: 50%;
    transform: translateX(-50%);
    font-size: var(--label-font);
    font-weight: 700;
    color: #8b6f47;
    text-align: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
  }

  /* Slide-in animation when photo card appears */
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px) scale(0.92); }
    to   { opacity: 1; transform: translateX(0)    scale(1); }
  }
  @keyframes slideOutRight {
    from { opacity: 1; transform: translateX(0)    scale(1); }
    to   { opacity: 0; transform: translateX(20px) scale(0.92); }
  }
  @keyframes slideInTop {
    from { opacity: 0; transform: translateY(-20px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes slideOutTop {
    from { opacity: 1; transform: translateY(0)    scale(1); }
    to   { opacity: 0; transform: translateY(-20px) scale(0.92); }
  }
  
  /* Landscape: slide from right */
  @media (orientation: landscape) {
    .photo-card-scene.entering { animation: slideInRight 0.25s ease-out forwards; }
    .photo-card-scene.exiting  { animation: slideOutRight 0.2s ease-in forwards; }
  }
  
  /* Portrait: slide from top */
  @media (orientation: portrait) {
    .photo-card-scene.entering { animation: slideInTop 0.25s ease-out forwards; }
    .photo-card-scene.exiting  { animation: slideOutTop 0.2s ease-in forwards; }
  }

  /* + Photo button on letter card — top right corner */
  .card-photo-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: rgba(255,255,255,0.85);
    color: #8b6f47;
    border: 1.5px solid #c8b89a;
    font-size: 1.1rem;
    font-weight: 400;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 25;
    transition: background 0.15s, color 0.15s;
    /* Don't interfere with card flip touch events */
    touch-action: none;
  }
  .card-photo-btn:hover {
    background: #8b6f47;
    color: white;
  }
  .card-photo-btn.has-photo {

    <!-- Left edge flash (clipped to notebook, covers arrow zone) -->

      </div>

      <!-- Paste area (hidden by default) -->
      <div id="manualPasteArea" style="display:none;flex-direction:column;gap:6px;flex-shrink:0;">
        <textarea id="manualPasteInput" rows="3" placeholder="Paste your list here: cat, bat, mat, sat"
          autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false"
          style="width:100%;font-family:'Comic Sans MS', 'Chalkboard SE', cursive;font-size:0.9rem;color:#5a4a32;padding:7px 10px;border:2px solid #c8b89a;border-radius:8px;outline:none;resize:none;"></textarea>
        <button onclick="importPastedWords()" style="background:#8b6f47;border:none;color:white;font-size:0.85rem;font-weight:700;padding:8px;border-radius:8px;cursor:pointer;width:100%;">Import</button>
      </div>

      <!-- Confirm -->
      <button onclick="confirmManualWords()" style="background:#4CAF50;border:none;color:white;font-size:0.95rem;font-weight:700;padding:10px;border-radius:10px;cursor:pointer;width:100%;flex-shrink:0;">✓ Confirm</button>
    </div>
  </div>

  <!-- ── Scroll Wheel Picker ── -->
  <div id="scrollWheelOverlay" style="display:none;position:fixed;inset:0;z-index:60000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
    <div style="background:white;border-radius:16px;padding:16px 20px;width:min(80vw,280px);box-shadow:0 8px 32px rgba(0,0,0,0.25);display:flex;flex-direction:column;align-items:center;gap:12px;">
      <span style="font-weight:700;font-size:0.95rem;color:#5a4a32;">Select Word</span>

      <!-- Drum wheel -->
      <div style="position:relative;width:100%;height:180px;overflow:hidden;">
        <!-- Highlight band -->
        <div style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:44px;background:rgba(139,111,71,0.1);border-top:2px solid #c8b89a;border-bottom:2px solid #c8b89a;pointer-events:none;z-index:2;border-radius:6px;"></div>
        <!-- Fade top/bottom -->
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,white 0%,transparent 30%,transparent 70%,white 100%);pointer-events:none;z-index:3;"></div>
        <!-- Scrollable list -->
        <div id="wheelList" style="position:absolute;left:0;right:0;overflow-y:scroll;height:100%;scrollbar-width:none;-ms-overflow-style:none;"
          onscroll="onWheelScroll()">
          <div id="wheelItems" style="padding:68px 0;"></div>
        </div>
      </div>

      <div style="display:flex;gap:10px;width:100%;">
        <button onclick="closeScrollWheel()" style="flex:1;background:#e0d8cc;border:none;color:#5a4a32;font-size:0.9rem;font-weight:700;padding:9px;border-radius:10px;cursor:pointer;">Cancel</button>
        <button onclick="confirmScrollWheel()" style="flex:1;background:#8b6f47;border:none;color:white;font-size:0.9rem;font-weight:700;padding:9px;border-radius:10px;cursor:pointer;">Select</button>
      </div>
    </div>
  </div>
  <script>
    const consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'q', 'r', 's', 't', 'v', 'w', 'x', 'y', 'z'];
    const vowels = ['a', 'e', 'i', 'o', 'u'];
    
    // Case toggle functionality
    const CASE_MODES = ['lower', 'UPPER', 'Sentence'];
    let currentCaseMode = 0;

    function applyCaseTransform(text, cardIndex) {
      const mode = CASE_MODES[currentCaseMode];
      if (mode === 'lower') {
        return text.toLowerCase();
      } else if (mode === 'UPPER') {
        return text.toUpperCase();
      } else if (mode === 'Sentence') {
        // Only capitalize the first card (index 0)
        if (cardIndex === 0) {
          return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
        } else {
          return text.toLowerCase();
        }
      }
      return text;
    }

    // Photo attachment functions
    function getCurrentWord() {
      // Get current word blend from all cards
      return gameState.cards.map(card => {
        const letter = card.letters[card.currentIndex];
        return applyCaseTransform(letter, 0).toLowerCase(); // Always use lowercase for storage key
      }).join('');
    }

    function attachPhotoToCurrentWord() {
      const word = getCurrentWord();
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          try {
            const dataUrl = await readFileAsDataUrl(file);
            savePhotoForWord(word, dataUrl);
          } catch { alert('Error reading image.'); }
        }
      };
      input.click();
    }

    function openPhotoGallery() {
      const modal = document.getElementById('photoGalleryModal');
      const overlay = document.getElementById('photoGalleryOverlay');
      const container = document.getElementById('galleryWordsContainer');

      container.innerHTML = '';
      const photoWords = Object.keys(wordPhotos);

      if (photoWords.length === 0) {
        container.innerHTML = '<div class="gallery-empty">No photos attached yet.<br><br>Turn on Photo Card and attach photos to word blends.</div>';
      } else {
        photoWords.sort((a, b) => a.localeCompare(b));
        photoWords.forEach(word => {
          const bubble = document.createElement('div');
          bubble.className = 'word-bubble';
          bubble.onclick = () => { navigateToWord(word); closePhotoGallery(); };

          let displayWord = word;
          if (CASE_MODES[currentCaseMode] === 'lower') displayWord = word.toLowerCase();
          else if (CASE_MODES[currentCaseMode] === 'UPPER') displayWord = word.toUpperCase();
          else if (CASE_MODES[currentCaseMode] === 'Sentence') displayWord = word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();

          const wordText = document.createElement('div');
          wordText.className = 'word-bubble-text';
          wordText.textContent = displayWord;
          bubble.appendChild(wordText);
          container.appendChild(bubble);
        });
      }

      modal.classList.add('show');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function navigateToWord(targetWord) {
      // Split target word into individual letters
      const targetLetters = targetWord.toLowerCase().split('');
      
      // Navigate each card to the corresponding letter
      gameState.cards.forEach((card, cardIndex) => {
        if (cardIndex < targetLetters.length) {
          const targetLetter = targetLetters[cardIndex];
          const letterIndex = card.letters.indexOf(targetLetter);
          
          if (letterIndex !== -1) {
            card.currentIndex = letterIndex;
            card.flippedCards = []; // Clear flipped stack when jumping
          }
        }
      });
      
      renderCards();
    }

    function closePhotoGallery() {
      document.getElementById('photoGalleryModal').classList.remove('show');
      document.getElementById('photoGalleryOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function toggleSettings() {
      const sd = document.getElementById('settingsDropdown');
      const panel = document.getElementById('settingsPanel');
      sd.classList.toggle('open');
      
      // If opening, adjust position based on available space
      if (sd.classList.contains('open')) {
        setTimeout(() => {
          const panelRect = panel.getBoundingClientRect();
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          
          // Check if panel is cut off on the right
          if (panelRect.right > viewportWidth) {
            panel.style.left = 'auto';
            panel.style.right = '0';
          }
          
          // Check if panel is cut off on the bottom
          if (panelRect.bottom > viewportHeight) {
            panel.style.top = 'auto';
            panel.style.bottom = 'calc(100% + 6px)';
          }
          
          // In landscape mode, check vertical position
          if (window.matchMedia('(orientation: landscape)').matches) {
            if (panelRect.right > viewportWidth) {
              panel.style.left = 'auto';
              panel.style.right = 'calc(100% + 6px)';
            }
          }
        }, 10);
      } else {
        // Reset to default positioning when closing
        panel.style.left = '';
        panel.style.right = '';
        panel.style.top = '';
        panel.style.bottom = '';
      }
    }

    function toggleCase() {
      currentCaseMode = (currentCaseMode + 1) % CASE_MODES.length;
      updateCaseButton();
      renderCards();
    }

    function updateCaseButton() {
      const btn = document.getElementById('caseToggleBtn');
      const labels = ['aa', 'AA', 'Aa'];
      btn.textContent = labels[currentCaseMode];
    }
    
    let gameState = {
      mode: 'cvc',
      cards: [
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] },
        { type: 'vowel', letters: vowels, currentIndex: 0, label: 'Vowel', flippedCards: [] },
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] }
      ]
    };

    let photoCardVisible = false;
    let photoMode = 'off'; // 'off' | 'in' | 'out'
    const wordPhotos = {}; // Shared photo store — same data regardless of In/Out mode

    function setPhotoMode(mode) {
      // Tapping the active mode turns it off
      if (photoMode === mode) mode = 'off';

      photoMode = mode;
      photoCardVisible = (mode !== 'off');

      // Update button highlights
      ['in','out'].forEach(m => {
        const btn = document.getElementById('photoBtn' + m.charAt(0).toUpperCase() + m.slice(1));
        if (btn) btn.classList.toggle('active', m === mode);
      });

      // Handle external photo container visibility
      const photoContainer = document.getElementById('photoCardContainer');
      if (mode === 'out') {
        photoContainer.classList.add('visible');
      } else {
        photoContainer.classList.remove('visible');
        photoContainer.innerHTML = '';
      }

      renderCards();
    }

    // ── Shared photo save with replace prompt ──────────────────────────────
    function savePhotoForWord(word, dataUrl) {
      if (wordPhotos[word]) {
        if (!confirm(`A photo already exists for "${word}".\nReplace it?`)) return;
      }
      wordPhotos[word] = dataUrl;
      renderCards();
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type.startsWith('image/')) { reject('Not an image'); return; }
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Module-level: track which word the mouse is currently hovering over
    let hoveredPhotoWord = null;
    // Track which card index the mouse is hovering over (for keyboard jump)
    let hoveredCardIndex = null;
    // Track the last card that was flipped (for green dot indicator)
    let lastActiveCardIndex = null;

    function setActiveCard(cardIndex) {
      lastActiveCardIndex = cardIndex;
      // Update all label dots
      document.querySelectorAll('.card-label').forEach((lbl, i) => {
        lbl.classList.toggle('active-card', i === cardIndex);
      });
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      // ── Arrow keys: use lastActiveCardIndex (green dot card) ──
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();

        const totalCards = gameState.cards.length;

        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          // Move active card focus left or right
          let next;
          if (lastActiveCardIndex === null) {
            // Nothing active yet — initiate first card
            next = e.key === 'ArrowRight' ? 0 : totalCards - 1;
          } else {
            next = e.key === 'ArrowRight'
              ? (lastActiveCardIndex + 1) % totalCards
              : (lastActiveCardIndex - 1 + totalCards) % totalCards;
          }
          setActiveCard(next);
          return;
        }

        // Up/Down: flip the active card
        if (lastActiveCardIndex === null) return; // no active card yet

        const scenes = document.querySelectorAll('.card-scene');
        const notebook = scenes[lastActiveCardIndex]?.querySelector('.notebook');

        if (e.key === 'ArrowUp') {
          if (notebook) flipCardForward(lastActiveCardIndex, notebook);
        } else {
          flipCardBackward(lastActiveCardIndex);
        }
        return;
      }

      // ── Letter key: jump hovered card to that letter ──
      if (hoveredCardIndex === null) return;
      if (e.key.length !== 1) return;

      const typed = e.key.toLowerCase();
      const card = gameState.cards[hoveredCardIndex];
      if (!card) return;

      const targetIndex = card.letters.findIndex(l => l.toLowerCase() === typed);
      if (targetIndex === -1) return;
      if (card.currentIndex === targetIndex) return;

      card.currentIndex = targetIndex;
      card.flippedCards = [];
      renderCards();
    });

    // Attach drag-and-drop + paste-on-hover to any element.
    // getWord() is called at event time to determine target word.
    function addPhotoDropAndPaste(el, getWord) {
      el.classList.add('photo-drop-target');

      // Track hovered word at the module level so it survives re-renders
      el.addEventListener('mouseenter', () => { hoveredPhotoWord = getWord(); });
      el.addEventListener('mouseleave', () => { hoveredPhotoWord = null; });

      // ── Drag and drop ──
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if ([...e.dataTransfer.types].includes('Files') || [...e.dataTransfer.types].includes('text/html')) {
          el.classList.add('drag-over');
          hoveredPhotoWord = getWord(); // refresh on dragover too
        }
      });
      el.addEventListener('dragleave', (e) => {
        if (!el.contains(e.relatedTarget)) {
          el.classList.remove('drag-over');
        }
      });
      el.addEventListener('drop', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        el.classList.remove('drag-over');
        const word = getWord();

        // Try file drop first
        const file = e.dataTransfer.files[0];
        if (file) {
          try {
            const dataUrl = await readFileAsDataUrl(file);
            savePhotoForWord(word, dataUrl);
          } catch { alert('Please drop an image file.'); }
          return;
        }

        // Try image dragged from browser
        const imgHtml = e.dataTransfer.getData('text/html');
        if (imgHtml) {
          const match = imgHtml.match(/src="([^"]+)"/);
          if (match) {
            try {
              const resp = await fetch(match[1]);
              const blob = await resp.blob();
              if (!blob.type.startsWith('image/')) { alert('Not an image.'); return; }
              const dataUrl = await readFileAsDataUrl(blob);
              savePhotoForWord(word, dataUrl);
            } catch { alert('Could not load that image. Try saving it locally first.'); }
            return;
          }
        }
        alert('Please drop an image file.');
      });
    }

    // Single global paste listener — routes to the currently hovered photo target word
    document.addEventListener('paste', async (e) => {
      const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);

      if (!isApple && hoveredPhotoWord !== null) {
        // Desktop: paste into whichever card word is hovered
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            try {
              const dataUrl = await readFileAsDataUrl(item.getAsFile());
              savePhotoForWord(hoveredPhotoWord, dataUrl);
            } catch { alert('Error reading pasted image.'); }
            return;
          }
        }
      } else if (isApple) {
        // iOS: fall through to the apple-paste-input handler in appendPhotoCard
        // (handled inline per card)
      }
    });

    function appendPhotoCard(wrapper, animate) {
      const scene = document.createElement('div');
      scene.className = 'photo-card-scene' + (animate ? ' entering' : '');

      const card = document.createElement('div');
      card.className = 'photo-card';

      // Get current word
      const currentWord = gameState.cards.map((c, i) => {
        const letter = c.letters[c.currentIndex];
        return applyCaseTransform(letter, 0).toLowerCase();
      }).join('');

      // Wire drag/drop + paste-on-hover; word is always the current word for this card
      const getCardWord = () => gameState.cards.map((c) =>
        applyCaseTransform(c.letters[c.currentIndex], 0).toLowerCase()
      ).join('');
      addPhotoDropAndPaste(card, getCardWord);
      card._getWord = getCardWord;

      // Check if current word has a photo
      if (wordPhotos[currentWord]) {
        // Display existing photo
        const img = document.createElement('img');
        img.src = wordPhotos[currentWord];
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.style.borderRadius = '10px';
        card.appendChild(img);
        
        // Add delete button (hidden by default)
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'photo-attach-btn has-photo';
        deleteBtn.textContent = '×';
        deleteBtn.style.fontSize = '24px';
        deleteBtn.style.display = 'none'; // Hidden by default
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          if (confirm(`Delete photo for "${currentWord}"?`)) {
            delete wordPhotos[currentWord];
            renderCards();
          }
        };
        card.appendChild(deleteBtn);
        
        // Show delete button when photo card is clicked
        card.style.cursor = 'pointer';
        card.onclick = () => {
          // Toggle delete button visibility
          if (deleteBtn.style.display === 'none') {
            deleteBtn.style.display = 'flex';
          } else {
            deleteBtn.style.display = 'none';
          }
        };
      } else {
        // Show attach button
        const plus = document.createElement('div');
        plus.className = 'photo-card-plus';
        plus.textContent = '+';

        const inner = document.createElement('div');
        inner.className = 'photo-card-label-inner';
        inner.textContent = 'Photo';

        card.appendChild(plus);
        card.appendChild(inner);
        
        // Detect device type
        const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
        
        if (isApple) {
          // Apple devices: Show visible search bar for paste
          const pasteInput = document.createElement('input');
          pasteInput.type = 'text';
          pasteInput.className = 'apple-paste-input';
          pasteInput.placeholder = 'Tap to paste';
          // NOT readOnly - allow keyboard to show, enabling paste option
          
          // Listen for paste event
          pasteInput.addEventListener('paste', (e) => {
            console.log('Paste event triggered on Apple device');
            e.preventDefault();
            
            const items = e.clipboardData?.items;
            console.log('Clipboard items:', items ? items.length : 'none');
            
            if (items) {
              for (let i = 0; i < items.length; i++) {
                console.log('Item type:', items[i].type);
                
                if (items[i].type.startsWith('image/')) {
                  console.log('Image found in clipboard!');
                  const blob = items[i].getAsFile();
                  const reader = new FileReader();
                  
                  reader.onload = (event) => {
                    const currentWord = getCurrentWord();
                    savePhotoForWord(currentWord, event.target.result);
                    pasteInput.value = '';
                    pasteInput.blur();
                  };
                  
                  reader.onerror = (error) => {
                    console.error('FileReader error:', error);
                    alert('Error reading image');
                  };
                  
                  reader.readAsDataURL(blob);
                  return; // Exit after finding image
                }
              }
              
              console.log('No image found in clipboard items');
              alert('No image found. Please copy an image first.');
            } else {
              console.log('No clipboard items available');
              alert('Clipboard is empty');
            }
          });
          
          // Also try input event as fallback
          pasteInput.addEventListener('input', (e) => {
            console.log('Input event triggered, value:', e.target.value);
          });
          
          card.appendChild(pasteInput);
          
        } else {
          // PC: Show paste button in corner
          const pasteArea = document.createElement('div');
          pasteArea.className = 'photo-paste-area';
          pasteArea.innerHTML = `
            <div class="photo-paste-icon">📋</div>
            <div class="photo-paste-text">Paste</div>
          `;
          
          pasteArea.onclick = async (e) => {
            e.stopPropagation();
            const pasted = await tryPasteImage();
            if (!pasted) {
              alert('No image in clipboard. Please copy an image first.');
            }
          };
          
          card.appendChild(pasteArea);
        }
        
        // Make main card area clickable for file upload
        card.style.cursor = 'pointer';
        card.onclick = (e) => {
          // Don't trigger if clicking paste area or input
          if (!e.target.closest('.photo-paste-area') && !e.target.classList.contains('apple-paste-input')) {
            attachPhotoToCurrentWord();
          }
        };
      }

      scene.appendChild(card);
      wrapper.appendChild(scene);
    }

    async function tryPasteImage(targetWord) {
      const word = targetWord || getCurrentWord();
      try {
        const permission = await navigator.permissions.query({ name: 'clipboard-read' });
        if (permission.state === 'denied') return false;

        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
          for (const type of item.types) {
            if (type.startsWith('image/')) {
              const blob = await item.getType(type);
              const dataUrl = await readFileAsDataUrl(blob);
              savePhotoForWord(word, dataUrl);
              return true;
            }
          }
        }
        return false;
      } catch (err) {
        console.log('Paste failed:', err.message);
        return false;
      }
    }

    async function pasteImageFromClipboard() {
      const pasted = await tryPasteImage();
      if (!pasted) {
        // Show platform-specific message
        const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
        
        if (isApple) {
          alert('Paste not available on this device.\n\nPlease use the + Photo area to upload images from your Photos app instead.');
        } else {
          alert('No image in clipboard.\n\nPlease copy an image first, or use the + Photo area to upload.');
        }
      }
    }

    function toggleDropdown() {
      const dropdown = document.querySelector('.dropdown');
      const content = document.getElementById('dropdownContent');
      content.classList.toggle('show');
      dropdown.classList.toggle('active');
    }

    function handleMenuItem(action) {
      const dropdown = document.querySelector('.dropdown');
      const content = document.getElementById('dropdownContent');
      content.classList.remove('show');
      dropdown.classList.remove('active');
      
      switch(action) {
        case 'cvc':
          setCVCMode();
          break;
        case 'cvvc':
          setCVVCMode();
          break;
        case 'short-a':
          setShortVowelA();
          break;
        case 'reset':
          resetAllCards();
          break;
        case 'about':
          alert('FlashABC - Notebook Flip Card Builder\nVersion 1.0\n\nClick cards to flip through letters!');
          break;
        case 'tracing':
          openTracingPage();
          break;
      }
    }

    function setCVCMode() {
      gameState.mode = 'cvc';
      gameState.cards = [
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] },
        { type: 'vowel', letters: vowels, currentIndex: 0, label: 'Vowel', flippedCards: [] },
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] }
      ];
      renderCards();
    }

    function setCVVCMode() {
      gameState.mode = 'cvvc';
      gameState.cards = [
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] },
        { type: 'vowel',     letters: vowels,     currentIndex: 0, label: 'Vowel',     flippedCards: [], isNarrow: true },
        { type: 'vowel',     letters: vowels,     currentIndex: 0, label: 'Vowel',     flippedCards: [], isNarrow: true },
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] }
      ];
      renderCards();
    }

    function setShortVowelA() {
      gameState.mode = 'short-a';
      gameState.cards = [
        { type: 'consonant', letters: ['a','b','c','d','e','f','g','h','i','j','k','l','m','n','o','p','q','r','s','t','u','v','w','x','y','z'], currentIndex: 0, label: 'Letter', flippedCards: [] },
        { type: 'word-ending', letters: ['am', 'ad', 'at', 'an', 'ap', 'ab', 'ack', 'ant', 'ang', 'ank', 'amp'], currentIndex: 0, label: 'Word Ending', isWide: true, flippedCards: [] }
      ];
      renderCards();
    }

    function resetAllCards() {
      gameState.cards.forEach(card => {
        card.currentIndex = 0;
        card.flippedCards = [];
      });
      renderCards();
    }

    function renderCards() {
      const wrapper = document.getElementById('cardsWrapper');
      wrapper.innerHTML = '';

      gameState.cards.forEach((cardData, cardIndex) => {
        const scene = document.createElement('div');
        scene.className = 'card-scene';
        
        // Binding rings
        const binding = document.createElement('div');
        binding.className = 'binding';
        binding.innerHTML = '<div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>';
        
        // Container for stacked flipped cards
        const flippedStack = document.createElement('div');
        flippedStack.className = 'flipped-stack';
        if (cardData.isWide) flippedStack.classList.add('wide');
        if (cardData.isNarrow) flippedStack.classList.add('narrow');
        
        // Add all previously flipped cards to the stack
        if (cardData.flippedCards && cardData.flippedCards.length > 0) {
          cardData.flippedCards.forEach((flip, index) => {
            const flippedCard = document.createElement('div');
            flippedCard.className = 'flipped-card';
            if (cardData.isWide) flippedCard.classList.add('wide');
            if (cardData.isNarrow) flippedCard.classList.add('narrow');
            flippedCard.style.zIndex = 100 + index;

            // In 'in' mode: show photo on the back (top face) of the top-most flipped card
            const isTopCard = index === cardData.flippedCards.length - 1;
            if (photoMode === 'in' && isTopCard && photoCardVisible) {
              const flipWord = typeof flip === 'object' ? flip.word : null;
              const photo = flipWord ? wordPhotos[flipWord] : null;

              if (photo) {
                // Display-only: just show the image, no interaction
                const img = document.createElement('img');
                img.src = photo;
                img.className = 'card-photo';
                img.style.borderRadius = '4px 4px 8px 8px';
                img.style.pointerEvents = 'none';
                flippedCard.appendChild(img);
              }
              // No photo = blank card, no cue, no interaction
            }

            flippedStack.appendChild(flippedCard);
          });
        }

        // Always show one blank card on top of the stack (above the binding)
        const alwaysTopCard = document.createElement('div');
        alwaysTopCard.className = 'flipped-card' + (cardData.isWide ? ' wide' : cardData.isNarrow ? ' narrow' : '');
        alwaysTopCard.style.zIndex = 200;
        flippedStack.appendChild(alwaysTopCard);
        
        const letters = cardData.letters;
        const currentIndex = cardData.currentIndex;
        const nextIndex = (currentIndex + 1) % letters.length;
        
        // Preview card (shows next letter underneath)
        const previewCard = document.createElement('div');
        previewCard.className = `preview-card ${cardData.type}`;
        if (cardData.isWide) {
          previewCard.classList.add('wide');
        } else if (cardData.isNarrow) {
          previewCard.classList.add('narrow');
        }
        previewCard.textContent = applyCaseTransform(letters[nextIndex], cardIndex);
        
        // Notebook (current active card)
        const notebook = document.createElement('div');
        notebook.className = `notebook ${cardData.type}`;
        if (cardData.isWide) {
          notebook.classList.add('wide');
        } else if (cardData.isNarrow) {
          notebook.classList.add('narrow');
        }
        
        // Front face (current letter)
        const faceFront = document.createElement('div');
        faceFront.className = 'face face-front';
        faceFront.textContent = applyCaseTransform(letters[currentIndex], cardIndex);

        // ── + Photo button (top-right of the letter card) ──
        if (photoCardVisible) {
          const currentWord = gameState.cards.map((c, i) =>
            c.letters[c.currentIndex].toLowerCase()
          ).join('');
          const hasPhoto = !!wordPhotos[currentWord];

          const photoBtn = document.createElement('button');
          photoBtn.className = 'card-photo-btn' + (hasPhoto ? ' has-photo' : '');
          photoBtn.textContent = hasPhoto ? '✓' : '+';
          photoBtn.title = hasPhoto ? 'Photo attached — click to replace' : 'Attach photo (click, drag, or Ctrl+V)';

          // Hovering the button sets the paste target word
          photoBtn.addEventListener('mouseenter', () => { hoveredPhotoWord = currentWord; });
          photoBtn.addEventListener('mouseleave', () => { hoveredPhotoWord = null; });

          // Click → file picker (with replace prompt if needed)
          photoBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            e.preventDefault();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (ev) => {
              const file = ev.target.files[0];
              if (file) {
                try {
                  const dataUrl = await readFileAsDataUrl(file);
                  savePhotoForWord(currentWord, dataUrl);
                } catch { alert('Error reading image.'); }
              }
            };
            input.click();
          });

          // Drag-and-drop onto the button itself
          addPhotoDropAndPaste(photoBtn, () => currentWord);

          // Prevent button touch events from propagating to the card flip handler
          photoBtn.addEventListener('touchstart', (e) => e.stopPropagation());
          photoBtn.addEventListener('touchend', (e) => {
            e.stopPropagation();
            e.preventDefault();
            // On touch, open file picker
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (ev) => {
              const file = ev.target.files[0];
              if (file) {
                try {
                  const dataUrl = await readFileAsDataUrl(file);
                  savePhotoForWord(currentWord, dataUrl);
                } catch { alert('Error reading image.'); }
              }
            };
            input.click();
          });

          faceFront.appendChild(photoBtn);
        }
        
        // Back face (next letter)
        const faceBack = document.createElement('div');
        faceBack.className = 'face face-back';
        faceBack.textContent = applyCaseTransform(letters[nextIndex], cardIndex);
        
        notebook.appendChild(faceFront);
        notebook.appendChild(faceBack);
        
        // Label
        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = cardData.label;
        
        scene.appendChild(flippedStack);
        scene.appendChild(binding);
        scene.appendChild(previewCard);
        scene.appendChild(notebook);
        scene.appendChild(label);

        // ── Unified event handling ──
        let touchStartY = 0;
        let touchStartTime = 0;
        let isSwiping = false;
        let touchOriginOnStack = false;

        scene.addEventListener('touchstart', (e) => {
          if (e.target.closest('.card-photo-btn')) return;
          touchOriginOnStack = flippedStack.contains(e.target);
          touchStartY = e.touches[0].clientY;
          touchStartTime = performance.now();
          isSwiping = false;
        }, { passive: true });

        scene.addEventListener('touchmove', (e) => {
          if (e.target.closest('.card-photo-btn')) return;
          isSwiping = true;
        }, { passive: true });

        scene.addEventListener('touchend', (e) => {
          if (e.target.closest('.card-photo-btn')) return;
          const endY = e.changedTouches[0].clientY;
          const endTime = performance.now();
          if (isSwiping) {
            handleSwipe(cardIndex, notebook, touchStartY, endY, touchStartTime, endTime);
          } else {
            e.preventDefault();
            if (touchOriginOnStack) {
              flipCardBackward(cardIndex);
            } else {
              flipCardForward(cardIndex, notebook);
            }
          }
        });

        // Desktop click
        scene.onclick = (e) => {
          if (e.defaultPrevented || e.target.closest('.card-photo-btn')) return;
          if (flippedStack.contains(e.target)) {
            flipCardBackward(cardIndex);
          } else {
            flipCardForward(cardIndex, notebook);
          }
        };

        // Keyboard jump tracking
        scene.addEventListener('mouseenter', () => {
          hoveredCardIndex = cardIndex;
        });
        scene.addEventListener('mouseleave', () => {
          if (hoveredCardIndex === cardIndex) hoveredCardIndex = null;
        });

        wrapper.appendChild(scene);
      });

      // Restore active card dot after DOM rebuild
      if (lastActiveCardIndex !== null) {
        document.querySelectorAll('.card-label').forEach((lbl, i) => {
          lbl.classList.toggle('active-card', i === lastActiveCardIndex);
        });
      }

      // Update photo card if visible (separate container) — only in 'out' mode
      if (photoCardVisible) {
        const photoContainer = document.getElementById('photoCardContainer');
        if (photoMode === 'out') {
          photoContainer.classList.add('visible');
          const existingPhoto = photoContainer.querySelector('.photo-card-scene');
          if (existingPhoto) photoContainer.removeChild(existingPhoto);
          appendPhotoCard(photoContainer, false);
        } else {
          photoContainer.classList.remove('visible');
          photoContainer.innerHTML = '';
        }
      } else {
        // off mode — ensure container is hidden
        const photoContainer = document.getElementById('photoCardContainer');
        photoContainer.classList.remove('visible');
        photoContainer.innerHTML = '';
      }
    }

    function handleSwipe(cardIndex, notebook, startY, endY, startTime, endTime) {
      const swipeDistance = startY - endY;
      const minSwipeDistance = 50;
      
      if (Math.abs(swipeDistance) > minSwipeDistance) {
        // Calculate swipe velocity (pixels per millisecond)
        const swipeTime = endTime - startTime;
        const velocity = Math.abs(swipeDistance) / swipeTime;
        
        // Map velocity to animation duration
        // Fast swipe (velocity > 2) = 200ms
        // Medium swipe (velocity 0.5-2) = 300ms
        // Slow swipe (velocity < 0.5) = 380ms
        let duration = 380;
        if (velocity > 2) {
          duration = 200;
        } else if (velocity > 0.5) {
          duration = 300;
        }
        
        if (swipeDistance > 0) {
          // Swipe up - go forward
          flipCardForward(cardIndex, notebook, duration);
        } else {
          // Swipe down - go backward
          flipCardBackward(cardIndex, duration);
        }
      }
    }

    let lastFlipTime = 0;
    const lastClickTimes = {}; // Track last click time per card
    // Track which cards are mid-animation to prevent double-taps
    const animatingCards = new Set();

    // ── Smooth rAF-driven arc animation ──────────────────────────────────────
    // Easing: ease-in-out sine — slow start, fast through binding, slow landing
    function easeInOutSine(t) {
      return -(Math.cos(Math.PI * t) - 1) / 2;
    }

    // Animate a flying card rotating around transform-origin:top center.
    // fromDeg → toDeg over durationMs.
    // onFrame(currentDeg) called each frame; onDone() called when finished.
    function animateFlyCard(flyCard, fromDeg, toDeg, durationMs, onFrame, onDone) {
      const startTime = performance.now();
      function frame(now) {
        const elapsed = now - startTime;
        const rawT = Math.min(elapsed / durationMs, 1);
        const easedT = easeInOutSine(rawT);
        const deg = fromDeg + (toDeg - fromDeg) * easedT;
        flyCard.style.transform = `rotateX(${deg}deg)`;
        onFrame(deg);
        if (rawT < 1) {
          requestAnimationFrame(frame);
        } else {
          onDone();
        }
      }
      requestAnimationFrame(frame);
    }

    function makeFlyCard(card, cardH, letter, cardIndex) {
      const flyCard = document.createElement('div');
      flyCard.className = `flying-card ${card.type}`;
      if (card.isWide) flyCard.classList.add('wide');
      if (card.isNarrow) flyCard.classList.add('narrow');
      flyCard.style.height = cardH + 'px';
      flyCard.style.top = '0px';

      // Letter label inside — shown/hidden based on angle in the rAF loop
      const letterEl = document.createElement('span');
      letterEl.className = 'fly-letter';
      letterEl.textContent = letter ? applyCaseTransform(letter, cardIndex) : '';
      flyCard.appendChild(letterEl);

      return flyCard;
    }

    function flipCardForward(cardIndex, notebook, duration) {
      if (animatingCards.has(cardIndex)) return;
      animatingCards.add(cardIndex);
      
      const now = performance.now();
      
      // If duration not provided (from swipe), calculate based on click speed
      if (duration === undefined) {
        const timeSinceLastClick = lastClickTimes[cardIndex] ? now - lastClickTimes[cardIndex] : 1000;
        lastClickTimes[cardIndex] = now;
        
        // Rapid clicking (< 400ms) = faster animation
        if (timeSinceLastClick < 400) {
          duration = 200;
        } else {
          duration = 380;
        }
      }
      
      lastClickTimes[cardIndex] = now;

      const card = gameState.cards[cardIndex];
      const currentLetter = card.letters[card.currentIndex];
      const nextIndex = (card.currentIndex + 1) % card.letters.length;
      const nextLetter = card.letters[nextIndex];
      const afterNextIndex = (nextIndex + 1) % card.letters.length;
      const afterNextLetter = card.letters[afterNextIndex];
      const scene = notebook.closest('.card-scene');
      const cardH = notebook.offsetHeight;

      // Pre-update the static scene to its post-flip state so renderCards()
      // causes zero visible snap when the flying card lands
      const previewCard = scene.querySelector('.preview-card');
      const faceFront   = scene.querySelector('.face-front');
      if (faceFront)   faceFront.textContent   = applyCaseTransform(nextLetter, cardIndex);
      if (previewCard) previewCard.textContent = applyCaseTransform(afterNextLetter, cardIndex);

      // Forward: show letter below binding (0→90°), hide above (90→180°)
      const flyCard = makeFlyCard(card, cardH, currentLetter, cardIndex);
      const letterEl = flyCard.querySelector('.fly-letter');
      flyCard.style.transform = 'rotateX(0deg)';
      scene.appendChild(flyCard);

      animateFlyCard(flyCard, 0, 180, duration, (deg) => {
        // Hide letter once card passes the binding (90°)
        letterEl.style.visibility = deg < 90 ? 'visible' : 'hidden';
      }, () => {
        if (flyCard.parentNode) flyCard.parentNode.removeChild(flyCard);

        if (!card.flippedCards) card.flippedCards = [];
        // Store letter AND the word that was active at the moment of flip
        const wordAtFlip = gameState.cards.map((c, i) => c.letters[i === cardIndex ? c.currentIndex : c.currentIndex]).join('').toLowerCase();
        card.flippedCards.push({ letter: currentLetter, word: wordAtFlip });
        card.currentIndex = (card.currentIndex + 1) % card.letters.length;
        // NOTE: do NOT clear flippedCards on cycle — backward wrap needs to remain possible

        animatingCards.delete(cardIndex);
        setActiveCard(cardIndex);
        renderCards();
      });
    }

    function flipCardBackward(cardIndex, duration) {
      if (animatingCards.has(cardIndex)) return;
      const card = gameState.cards[cardIndex];

      animatingCards.add(cardIndex);

      const now = performance.now();
      if (duration === undefined) {
        const timeSinceLastClick = lastClickTimes[cardIndex] ? now - lastClickTimes[cardIndex] : 1000;
        lastClickTimes[cardIndex] = now;
        duration = timeSinceLastClick < 400 ? 200 : 320;
      }
      lastClickTimes[cardIndex] = now;

      // Always step one back sequentially (wraps z→b→a style)
      const prevIndex = (card.currentIndex - 1 + card.letters.length) % card.letters.length;
      const returningLetter = card.letters[prevIndex];
      const hasFlippedCard = card.flippedCards && card.flippedCards.length > 0;

      const wrapper = document.getElementById('cardsWrapper');
      const scenes = wrapper.querySelectorAll('.card-scene');
      const scene = scenes[cardIndex];
      const notebook = scene ? scene.querySelector('.notebook') : null;

      if (notebook && scene) {
        const cardH = notebook.offsetHeight;

        // Keep the scene completely frozen during backward animation —
        // same principle as forward: static card unchanged, only flying card moves.
        // State + re-render fire only in onDone once the card has fully landed.

        const flyCard = makeFlyCard(card, cardH, returningLetter, cardIndex);
        const letterEl = flyCard.querySelector('.fly-letter');
        letterEl.style.visibility = 'hidden';
        flyCard.style.transform = 'rotateX(180deg)';
        scene.appendChild(flyCard);

        animateFlyCard(flyCard, 180, 0, duration, (deg) => {
          letterEl.style.visibility = deg < 90 ? 'visible' : 'hidden';
        }, () => {
          if (flyCard.parentNode) flyCard.parentNode.removeChild(flyCard);

          // Pop from flipped stack if available, otherwise just step index back
          if (hasFlippedCard) {
            card.flippedCards.pop();
          }
          card.currentIndex = prevIndex;

          animatingCards.delete(cardIndex);
          setActiveCard(cardIndex);
          renderCards();
        });
      } else {
        if (hasFlippedCard) card.flippedCards.pop();
        card.currentIndex = prevIndex;
        animatingCards.delete(cardIndex);
        setActiveCard(cardIndex);
        renderCards();
      }
    }

    // ── Letter Tracing Page ────────────────────────────────────────────────

    let tracingWord = '';
    let tracingCtx = null;
    let tracingDrawing = false;
    let tracingLastX = 0, tracingLastY = 0;
    let tracingCaseMode = 0; // 0=lower, 1=UPPER, 2=Sentence

    const tracingColors = [
      '#e74c3c', // Red
      '#2980b9', // Blue
      '#f1c40f', // Yellow
      '#27ae60', // Green
      '#2c2c2c', // Black
      '#e67e22', // Orange
      '#8e44ad', // Purple
      '#e91e8c', // Pink
      '#795548', // Brown
      '#757575', // Gray
    ];
    let tracingColorIdx   = 0;
    let tracingColorQueue = [];

    function refillColorQueue() {
      // Fisher-Yates shuffle
      const arr = tracingColors.map((_, i) => i);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      // Avoid repeating the last colour from the previous round
      if (tracingColorQueue.length === 0 && arr[0] === tracingColorIdx) {
        arr.push(arr.shift());
      }
      tracingColorQueue = arr;
    }

    function randomTracingColor() {
      if (tracingColorQueue.length === 0) refillColorQueue();
      tracingColorIdx = tracingColorQueue.shift();
    }

    function cycleTracingCase() {
      tracingCaseMode = (tracingCaseMode + 1) % 3;
      const labels = ['aa','AA','Aa'];
      document.getElementById('tracingCaseBtn').textContent = labels[tracingCaseMode];
      drawTracingPage();
    }

    function applyTracingCase(word) {
      if (!word) return '';
      if (tracingCaseMode === 1) return word.toUpperCase();
      if (tracingCaseMode === 2) return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
      return word.toLowerCase(); // mode 0: always display lowercase
    }

    function openTracingPage() {
      const page = document.getElementById('tracingPage');
      page.style.display = 'flex';
      const input = document.getElementById('tracingWordInput');
      input.value = tracingWord || '';
      
      setTimeout(() => { setupTracingCanvas(); }, 50);
    }

    function closeTracingPage() {
      document.getElementById('tracingPage').style.display = 'none';
    }

    function clearTracing() {
      tracingStrokes  = [];
      randomTracingColor();
      tracingToolMode = 'draw';
      setTracingTool('draw');
      drawTracingPage();
    }

    function onTracingWordInput(val) {
      val = val.replace(/[^a-zA-Z]/g, '').slice(0, 6);
      tracingWord = val;
      const input = document.getElementById('tracingWordInput');
      input.value = val;
      randomTracingColor();
      drawTracingPage();
    }

    function setupTracingCanvas() {
      const canvas = document.getElementById('tracingCanvas');
      const notebook = document.getElementById('tracingNotebook');
      const rect = notebook.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      const w = rect.width - 12;
      const h = rect.height - 12;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';

      tracingCtx = canvas.getContext('2d');
      tracingCtx.scale(dpr, dpr);

      drawTracingPage();
      wireTracingEvents(canvas);
    }

    // Four-line notebook ruling matching reference image:
    // l1 = ascender/top line (solid)
    // l2 = midline / x-height (dashed)
    // l3 = baseline (solid, slightly darker)
    // l4 = descender line (solid)
    function getTracingLines(H, letterCount) {
      // Scale the ruling zone by letter count:
      // 1 letter = 92%, 2 = 84%, 3 = 76%, 4 = 68%, 5 = 60%, 6 = 52%
      const n = Math.max(1, Math.min(letterCount || 1, 6));
      const scaleFactor = 0.92 - (n - 1) * 0.08;

      const fullPadTop    = 10;
      const fullPadBottom = 10;
      const fullUsable    = H - fullPadTop - fullPadBottom;
      const scaledUsable  = fullUsable * scaleFactor;

      // Centre the scaled zone vertically
      const offset = (fullUsable - scaledUsable) / 2;
      const padTop = fullPadTop + offset;

      return {
        l1: padTop,
        l2: padTop + scaledUsable * 0.42,
        l3: padTop + scaledUsable * 0.75,
        l4: padTop + scaledUsable * 1.0
      };
    }

    function drawTracingPage() {
      const canvas = document.getElementById('tracingCanvas');
      if (!tracingCtx) return;
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.width  / dpr;
      const H = canvas.height / dpr;
      const ctx = tracingCtx;

      ctx.clearRect(0, 0, W, H);

      // Clear user strokes and hide clear button on fresh redraw
      // But don't reset tool when called from replayStrokes
      if (!tracingReplayMode) {
        tracingStrokes = [];
        const eraseBtn = document.getElementById('tracingEraseBtn');
        if (eraseBtn) eraseBtn.style.display = 'none';
        tracingToolMode = 'draw';
        setTracingTool('draw');
      }

      // White paper
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 0, 0, W, H, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 1;
      roundRect(ctx, 0, 0, W, H, 10);
      ctx.stroke();

      // Draw word index top-centre — only when there's a list with words
      const listForCount = tracingMode === 'alphabet' ? ALPHABET_LIST : tracingWordList;
      const curIdx = tracingMode === 'alphabet' ? alphabetIndex : tracingWordIndex;
      if (listForCount.length > 0) {
        const label = `${curIdx + 1} / ${listForCount.length}`;
        ctx.save();
        ctx.font         = `600 13px Arial, sans-serif`;
        ctx.fillStyle    = '#b0a898';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(label, W / 2, 7);
        ctx.restore();
      }

      // Determine letter count for scaling
      let letterCountForScale;
      if (tracingMode === 'alphabet') {
        letterCountForScale = 2; // always shows "A a" (2 glyphs)
      } else {
        letterCountForScale = tracingWord ? Math.max(1, tracingWord.length) : 1;
      }

      const { l1, l2, l3, l4 } = getTracingLines(H, letterCountForScale);
      const marginL = 48;

      // Four lines
      drawRule(ctx, marginL, W - 48, l1, '#c4c8d8', false, 1);    // ascender — solid
      drawRule(ctx, marginL, W - 48, l2, '#c4c8d8', true,  1);    // midline  — dashed
      drawRule(ctx, marginL, W - 48, l3, '#9098b8', false, 1.5);  // baseline — solid darker
      drawRule(ctx, marginL, W - 48, l4, '#c4c8d8', false, 1);    // descender — solid

      // Red margin
      ctx.strokeStyle = '#f08888';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(marginL, l1 - 8);
      ctx.lineTo(marginL, l4 + 8);
      ctx.stroke();

      if (!tracingWord) return;

      // Comic Sans cap-height ≈ 72% of em-size
      // Size so cap-height exactly spans l1→l3
      const capZone = l3 - l1;
      let fontSize  = capZone / 0.72;

      const totalW = W - marginL - 48;

      // For manual mode, check if the displayed (case-applied) word is too wide
      // and shrink fontSize until it fits — handles wide uppercase like "MMMMMM"
      if (tracingMode !== 'alphabet' && tracingWord) {
        const displayWord = applyTracingCase(tracingWord);
        const letters = displayWord.split('');
        ctx.font = `400 ${fontSize}px 'Comic Sans MS', 'Chalkboard SE', cursive`;
        const pad = fontSize * 0.03;
        const blockW = letters.reduce((sum, ch) => sum + ctx.measureText(ch).width + pad, 0);
        if (blockW > totalW) {
          fontSize = fontSize * (totalW / blockW) * 0.97; // 3% safety margin
        }
      }

      ctx.font         = `400 ${fontSize}px 'Comic Sans MS', 'Chalkboard SE', cursive`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle    = 'rgba(155,160,180,0.38)';

      // Clip to full canvas height (no vertical clipping) but respect horizontal margins
      // This prevents tall/deep letters (g, y, p, capitals) from being cut off
      ctx.save();
      ctx.beginPath();
      ctx.rect(marginL, 0, W - marginL - 48, H);
      ctx.clip();

      if (tracingMode === 'alphabet') {
        const ch    = tracingWord.toLowerCase();
        const padX  = (W - marginL - 48) / 4;
        ctx.fillText(ch.toUpperCase(), marginL + padX,     l3);
        ctx.fillText(ch,               marginL + padX * 3, l3);
      } else {
        const displayWord = applyTracingCase(tracingWord);
        const letters = displayWord.split('');
        const n       = letters.length;
        // Measure each glyph's actual width and add a small fixed padding
        const pad = fontSize * 0.03;
        const glyphWidths = letters.map(ch => ctx.measureText(ch).width + pad);
        const blockW = glyphWidths.reduce((a, b) => a + b, 0);
        // If measured block is wider than available space, scale down uniformly
        const scale  = Math.min(1, totalW / blockW);
        const scaledWidths = glyphWidths.map(w => w * scale);
        const scaledBlock  = scaledWidths.reduce((a, b) => a + b, 0);
        let x = marginL + (totalW - scaledBlock) / 2;
        letters.forEach((ch, i) => {
          ctx.fillText(ch, x + scaledWidths[i] / 2, l3);
          x += scaledWidths[i];
        });
      }

      ctx.restore();
    }

    function drawRule(ctx, x1, x2, y, color, dashed, lw) {
      ctx.strokeStyle = color;
      ctx.lineWidth   = lw;
      ctx.setLineDash(dashed ? [7, 5] : []);
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x2, y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function wireTracingEvents(canvas) {
      // Remove old listeners by cloning
      const fresh = canvas.cloneNode(true);
      canvas.parentNode.replaceChild(fresh, canvas);
      const c = document.getElementById('tracingCanvas');
      tracingCtx = c.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      tracingCtx.scale(dpr, dpr);
      drawTracingPage();

      function getPos(e) {
        const rect = c.getBoundingClientRect();
        const src  = e.touches ? e.touches[0] : e;
        return { x: src.clientX - rect.left, y: src.clientY - rect.top };
      }

      function showCursor(x, y, isTouch) {
        const cursor = document.getElementById('tracingCursor');
        if (!cursor) return;
        cursor.style.display = '';
        cursor.style.left = x + 'px';
        cursor.style.top  = y + 'px';
        const isErase = tracingToolMode === 'erase';
        if (isErase) {
          // Eraser: bottom-right corner at contact point
          cursor.style.transform = 'translate(-100%, -100%)';
        } else {
          // Pencil: bottom-left corner at contact point
          cursor.style.transform = 'translate(0px, -100%)';
        }
      }

      function hideCursor() {
        const cursor = document.getElementById('tracingCursor');
        if (cursor) cursor.style.display = 'none';
      }

      function startDraw(e) {
        e.preventDefault();
        tracingDrawing = true;
        const p = getPos(e);
        tracingLastX = p.x; tracingLastY = p.y;
        pickColorForPosition(p.x);
        showCursor(p.x, p.y, !!e.touches);
      }

      function moveDraw(e) {
        e.preventDefault();
        if (!tracingDrawing) return;
        const p = getPos(e);
        paintStroke(tracingLastX, tracingLastY, p.x, p.y);
        tracingLastX = p.x; tracingLastY = p.y;
        showCursor(p.x, p.y, !!e.touches);
      }

      function endDraw(e) {
        tracingDrawing = false;
        hideCursor();
      }

      c.addEventListener('mousedown',  startDraw);
      c.addEventListener('mousemove',  moveDraw);
      c.addEventListener('mouseup',    endDraw);
      c.addEventListener('mouseleave', endDraw);
      c.addEventListener('touchstart', startDraw, { passive: false });
      c.addEventListener('touchmove',  moveDraw,  { passive: false });
      c.addEventListener('touchend',   endDraw);
    }

    function pickColorForPosition(x) {
      // Both modes use a single shuffle-queue colour per word — no position-based override
      return;
    }

    let tracingReplayMode = false;
    let tracingToolMode   = 'draw';
    let tracingStrokes    = [];

    function setTracingTool(mode) {
      tracingToolMode = mode;
      const drawBtn  = document.getElementById('tracingToolDraw');
      const eraseBtn = document.getElementById('tracingToolErase');
      if (!drawBtn || !eraseBtn) return;
      if (mode === 'draw') {
        drawBtn.style.background  = '#fff3c0';
        drawBtn.style.opacity     = '1';
        eraseBtn.style.background = '#f0f0f0';
        eraseBtn.style.opacity    = '1';
      } else {
        eraseBtn.style.background = '#ffe0e0';
        eraseBtn.style.opacity    = '1';
        drawBtn.style.background  = '#f0f0f0';
        drawBtn.style.opacity     = '1';
      }
      // Swap cursor icon
      const cDraw  = document.getElementById('cursorIconDraw');
      const cErase = document.getElementById('cursorIconErase');
      if (cDraw)  cDraw.style.display  = mode === 'draw'  ? '' : 'none';
      if (cErase) cErase.style.display = mode === 'erase' ? '' : 'none';
    }

    function replayStrokes() {
      const saved = tracingStrokes.slice();
      tracingReplayMode = true;
      drawTracingPage();
      tracingReplayMode = false;
      tracingStrokes = saved;
      const ctx = tracingCtx;
      if (!ctx) return;
      tracingStrokes.forEach(s => {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = s.color;
        ctx.lineWidth   = 18;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.globalAlpha = 0.82;
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      });
      const clearBtn = document.getElementById('tracingEraseBtn');
      if (clearBtn) clearBtn.style.display = tracingStrokes.length > 0 ? 'inline-flex' : 'none';
    }

    function paintStroke(x1, y1, x2, y2) {
      const ctx = tracingCtx;
      if (!ctx) return;

      if (tracingToolMode === 'erase') {
        const eraseR = 60; // erase radius
        const prevLen = tracingStrokes.length;
