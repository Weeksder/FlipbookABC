<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlashABC - Notebook Flip Card Builder</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed;
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
    font-family: Arial, sans-serif;
    touch-action: pan-y; /* Allow vertical scrolling only, no zoom */
    -webkit-user-select: none; /* Prevent text selection */
    user-select: none;
  }

  .container { max-width: 100%; height: 100%; margin: 0 auto; display: flex; flex-direction: column; }
  
  /* Top Bar */
  .top-bar { 
    padding: 15px; 
    display: flex; 
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  /* ── Landscape: sidebar layout ── */
  @media (orientation: landscape) {
    .container {
      flex-direction: row;
    }
    .top-bar {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 12px 8px;
      gap: 12px;
      width: 64px;
      flex-shrink: 0;
      border-right: 1px solid rgba(139,111,71,0.15);
    }
    .cards-container {
      flex: 1;
      width: 0; /* let flex handle it */
    }
    /* Stack dropdown below other buttons */
    .dropdown-content {
      right: auto;
      left: 100%;
      top: 0;
      margin-top: 0;
      margin-left: 5px;
    }
  }

  /* Case Toggle Button */
  .case-toggle-btn {
    font-size: 0.9rem;
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #8b6f47;
    background: transparent;
    color: #8b6f47;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .case-toggle-btn:hover {
    background: #8b6f47;
    color: white;
  }

  /* Dropdown Menu */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-btn {
    padding: 8px; border: none; border-radius: 8px; font-size: 1.5rem;
    font-weight: 600; cursor: pointer; transition: all 0.3s;
    background: transparent; color: #8b6f47; border: 2px solid #8b6f47;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  }
  .dropdown-btn:hover, .dropdown-btn:active, .dropdown.active .dropdown-btn {
    background: #8b6f47; color: white;
  }
  .dropdown-content {
    display: none; position: absolute; right: 0; margin-top: 5px;
    background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    min-width: 160px; z-index: 1100;
  }
  .dropdown-content.show { display: block; }
  .dropdown-content button {
    display: block; width: 100%; padding: 10px 14px; border: none;
    background: white; color: #333; font-size: 0.85rem; font-weight: 600;
    text-align: left; cursor: pointer; transition: background 0.2s;
  }
  .dropdown-content button:first-child { border-radius: 8px 8px 0 0; }
  .dropdown-content button:last-child { border-radius: 0 0 8px 8px; }
  .dropdown-content button:hover { background: #f0f0f0; }

  /*
   * Fluid sizing system — sized to fill the screen like the reference image
   * Cards are near-square (h ≈ 1.15× w) and large enough to dominate the viewport
   */

  /* ── Portrait phone (default baseline) — scaled for 4 cards ── */
  :root {
    --card-w:          21vw;
    --card-h:          24vw;
    --card-font:       12vw;
    --we-font:         7.5vw;
    --wide-mult:       2.2;
    --gap:             0.5vw;
    --stack-h:         24vw;
    --wrapper-pad-top: 26vw;
    --wrapper-pad-x:   2vw;
    --wrapper-pad-bot: 4vw;
    --ring-w:          2.4vw;
    --ring-h:          3.2vw;
    --ring-gap:        1.4vw;
    --binding-top:     -2.2vw;
    --label-bottom:    -3.8vw;
    --label-font:      2.4vw;
    --perspective:     100vw;
  }

  /* ── Landscape phone ── */
  @media (orientation: landscape) and (max-height: 500px) {
    :root {
      --card-w:          26vh;
      --card-h:          30vh;
      --card-font:       17vh;
      --we-font:         11vh;
      --wide-mult:       2.0;
      --gap:             0.75vh;
      --stack-h:         30vh;
      --wrapper-pad-top: 32vh;
      --wrapper-pad-x:   1.5vh;
      --wrapper-pad-bot: 3vh;
      --ring-w:          2.8vh;
      --ring-h:          3.8vh;
      --ring-gap:        1.5vh;
      --binding-top:     -2.5vh;
      --label-bottom:    -4vh;
      --label-font:      2.4vh;
      --perspective:     120vh;
    }
  }

  /* ── Portrait tablet — scaled for 4 cards ── */
  @media (orientation: portrait) and (min-width: 600px) {
    :root {
      --card-w:          21vw;
      --card-h:          24vw;
      --card-font:       12vw;
      --we-font:         7.5vw;
      --wide-mult:       2.2;
      --gap:             0.5vw;
      --stack-h:         24vw;
      --wrapper-pad-top: 26vw;
      --wrapper-pad-x:   2vw;
      --wrapper-pad-bot: 4vw;
      --ring-w:          2.4vw;
      --ring-h:          3.2vw;
      --ring-gap:        1.4vw;
      --binding-top:     -2.2vw;
      --label-bottom:    -3.8vw;
      --label-font:      2.4vw;
      --perspective:     100vw;
    }
  }

  /* ── Landscape tablet (iPad landscape) ── */
  @media (orientation: landscape) and (min-height: 500px) and (max-width: 1400px) {
    :root {
      --card-w:          34vh;
      --card-h:          39vh;
      --card-font:       23vh;
      --we-font:         14vh;
      --wide-mult:       2.1;
      --gap:             1vh;
      --stack-h:         39vh;
      --wrapper-pad-top: 42vh;
      --wrapper-pad-x:   2vh;
      --wrapper-pad-bot: 4vh;
      --ring-w:          3.5vh;
      --ring-h:          4.8vh;
      --ring-gap:        1.8vh;
      --binding-top:     -3.2vh;
      --label-bottom:    -5vh;
      --label-font:      3vh;
      --perspective:     150vh;
    }
  }

  /* ── Large desktop (landscape) ── */
  @media (orientation: landscape) and (min-width: 1400px) {
    :root {
      --card-w:          30vh;
      --card-h:          34vh;
      --card-font:       20vh;
      --we-font:         12.5vh;
      --wide-mult:       2.1;
      --gap:             1vh;
      --stack-h:         34vh;
      --wrapper-pad-top: 37vh;
      --wrapper-pad-x:   2vh;
      --wrapper-pad-bot: 4vh;
      --ring-w:          3.2vh;
      --ring-h:          4.2vh;
      --ring-gap:        1.6vh;
      --binding-top:     -2.8vh;
      --label-bottom:    -4.5vh;
      --label-font:      2.8vh;
      --perspective:     140vh;
    }
  }

  /* Cards Container */
  .cards-container { 
    position: relative; 
    width: 100%; 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center;
    padding: 2vmin;
    gap: 8px; /* Reduced from 20px */
  }
  
  /* Photo Card Container - separate boundary */
  .photo-card-container {
    display: none; /* Hidden by default */
    position: relative;
    z-index: 5;
  }
  
  .photo-card-container.visible {
    display: block;
  }
  
  /* Portrait: Photo above flipbook */
  @media (orientation: portrait) {
    .cards-container {
      flex-direction: column;
      gap: 5px; /* Tighter gap in portrait */
    }
    
    .photo-card-container {
      order: -1; /* Photo first */
    }
  }
  
  /* Landscape: Photo and flipbook side by side */
  @media (orientation: landscape) {
    .cards-container {
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px; /* Tighter gap in landscape */
    }
  }
  
  .cards-wrapper { 
    display: flex;
    gap: var(--gap);
    justify-content: center;
    align-items: flex-start;
    position: relative;
    background: rgba(210, 180, 140, 0.3);
    padding: var(--wrapper-pad-top) var(--wrapper-pad-x) var(--wrapper-pad-bot);
    border-radius: 15px;
    max-width: fit-content;
    overflow: visible;
  }

  /* Individual Card Scene */
  .card-scene {
    perspective: var(--perspective);
    perspective-origin: 50% 0%;
    cursor: pointer;
    user-select: none;
    position: relative;
    overflow: visible;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* Preview card */
  .preview-card {
    position: absolute;
    top: 0; left: 0;
    width: var(--card-w);
    height: var(--card-h);
    background: #fff8ee;
    border: 2px solid #c8b89a;
    border-radius: 6px 6px 10px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--card-font);
    font-weight: 600;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Sans', 'Marker Felt', cursive, sans-serif;
    z-index: 1;
  }

  .preview-card.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .preview-card.consonant { color: #3b82f6; }
  .preview-card.vowel     { color: #ef4444; }
  .preview-card.word-ending { font-size: var(--we-font); color: #f59e0b; }

  /* Stacked flipped cards */
  .flipped-stack {
    position: absolute;
    top: calc(-1 * var(--stack-h));
    left: 0;
    width: var(--card-w);
    height: var(--stack-h);
    pointer-events: auto;
    z-index: 10;
    cursor: pointer;
  }

  .flipped-stack.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .flipped-card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #fff8ee;
    border: 2px solid #c8b89a;
    border-radius: 6px 6px 10px 10px;
  }

  .notebook {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    transform-origin: top center;
    transform-style: preserve-3d;
    z-index: 5;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: translateZ(0);
  }

  .notebook.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  /* Faces */
  .face {
    position: absolute;
    inset: 0;
    border-radius: 6px 6px 10px 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: var(--card-font);
    font-weight: 600;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Sans', 'Marker Felt', cursive, sans-serif;
  }

  .face-front {
    background: #fff8ee;
    border: 2px solid #c8b89a;
  }

  .face-back {
    background: #eef4ff;
    border: 2px solid #a0b4d0;
    transform: rotateX(180deg);
    opacity: 0;
  }

  /* Color Coding */
  .consonant .face-front, .consonant .face-back { color: #3b82f6; }
  .vowel .face-front, .vowel .face-back         { color: #ef4444; }
  .word-ending .face-front, .word-ending .face-back { font-size: var(--we-font); color: #f59e0b; }

  /* Binding Rings */
  .binding {
    position: absolute;
    top: var(--binding-top);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: var(--ring-gap);
    z-index: 10;
    pointer-events: none;
  }

  .ring {
    width: var(--ring-w);
    height: var(--ring-h);
    border: 2.5px solid #8b6f47;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: transparent;
    position: relative;
  }

  .ring::after {
    content: '';
    position: absolute;
    bottom: 0; left: 2px; right: 2px;
    height: 40%;
    border: 2px solid #a0885f;
    border-top: none;
    border-radius: 0 0 50% 50%;
  }

  /* Card Label */
  .card-label {
    position: absolute;
    bottom: var(--label-bottom);
    left: 50%;
    transform: translateX(-50%);
    font-size: var(--label-font);
    font-weight: 700;
    color: #8b6f47;
    text-align: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
  }

  /* Flipped state */
  .notebook.flipped {
    transform: rotateX(180deg);
  }

  /* Flying card */
  .flying-card {
    position: absolute;
    left: 0;
    width: var(--card-w);
    background: #fff8ee;
    border: 2px solid #c8b89a;
    border-radius: 6px 6px 10px 10px;
    z-index: 50;
    pointer-events: none;
    transform-origin: top center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flying-card.wide {
    width: calc(var(--card-w) * var(--wide-mult));
  }

  .fly-letter {
    font-size: var(--card-font);
    font-weight: 600;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Sans', 'Marker Felt', cursive, sans-serif;
  }

  .flying-card.consonant .fly-letter  { color: #3b82f6; }
  .flying-card.vowel .fly-letter      { color: #ef4444; }
  .flying-card.word-ending .fly-letter { font-size: var(--we-font); color: #f59e0b; }

  /* ── Settings gear ── */
  .settings-dropdown { position: relative; display: inline-block; }

  .settings-btn {
    width: 44px; height: 44px;
    border: 2px solid #8b6f47;
    border-radius: 8px;
    background: transparent;
    color: #8b6f47;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .settings-btn:hover, .settings-dropdown.open .settings-btn {
    background: #8b6f47; color: white;
  }
  .settings-btn svg { pointer-events: none; }

  .settings-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    min-width: 210px;
    z-index: 1100;
    padding: 8px 0 10px;
    overflow: hidden;
  }
  .settings-dropdown.open .settings-panel { display: block; }

  /* In landscape sidebar, open to the right */
  @media (orientation: landscape) {
    .settings-panel {
      top: 0;
      left: calc(100% + 6px);
    }
  }

  .settings-title {
    font-size: 0.65rem;
    font-weight: 700;
    color: #a0885f;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 5px 14px 8px;
    border-bottom: 1px solid #f0e8d8;
    margin-bottom: 3px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    gap: 12px;
  }

  .settings-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #5a4a32;
    white-space: nowrap;
  }

  .settings-toggle-btn {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 14px;
    border: 2px solid #8b6f47;
    background: transparent;
    color: #8b6f47;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    min-width: 46px;
    text-align: center;
  }
  .settings-toggle-btn:hover { background: #f5ece0; }
  .settings-toggle-btn.active {
    background: #8b6f47;
    color: white;
  }

  /* Photo card scene — same dimensions as a regular card */
  .photo-card-scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Slide in/out animation */
    overflow: visible;
  }

  .photo-card {
    width: var(--card-w);
    height: var(--card-h);
    background: #f0f4f0;
    border: 2px dashed #a0b49a;
    border-radius: 6px 6px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5em;
    color: #7a9a74;
    cursor: default;
    user-select: none;
  }

  /* Portrait mode: Make photo card 75% larger */
  @media (orientation: portrait) {
    .photo-card {
      width: calc(var(--card-w) * 1.75);
      height: calc(var(--card-h) * 1.75);
    }
    
    .photo-card-plus {
      font-size: calc(var(--card-font) * 0.55 * 1.75);
    }
    
    .photo-card-label-inner {
      font-size: calc(var(--label-font) * 0.85 * 1.75);
    }
  }

  /* Simple flat paste button - bottom right corner */
  .photo-paste-area {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 25%;
    height: 22%;
    border-left: 2px dashed #a0b49a;
    border-top: 2px dashed #a0b49a;
    background: rgba(122, 154, 116, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
  }

  .photo-paste-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .photo-paste-text {
    font-size: 0.5rem;
    font-weight: 600;
    color: #7a9a74;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .photo-card-plus {
    font-size: calc(var(--card-font) * 0.55);
    font-weight: 300;
    line-height: 1;
    color: #7a9a74;
  }

  .photo-card-label-inner {
    font-size: calc(var(--label-font) * 0.85);
    font-weight: 600;
    color: #7a9a74;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .photo-card-label {
    position: absolute;
    bottom: var(--label-bottom);
    left: 50%;
    transform: translateX(-50%);
    font-size: var(--label-font);
    font-weight: 700;
    color: #8b6f47;
    text-align: center;
    white-space: nowrap;
    font-family: Arial, sans-serif;
  }

  /* Slide-in animation when photo card appears */
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px) scale(0.92); }
    to   { opacity: 1; transform: translateX(0)    scale(1); }
  }
  @keyframes slideOutRight {
    from { opacity: 1; transform: translateX(0)    scale(1); }
    to   { opacity: 0; transform: translateX(20px) scale(0.92); }
  }
  @keyframes slideInTop {
    from { opacity: 0; transform: translateY(-20px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes slideOutTop {
    from { opacity: 1; transform: translateY(0)    scale(1); }
    to   { opacity: 0; transform: translateY(-20px) scale(0.92); }
  }
  
  /* Landscape: slide from right */
  @media (orientation: landscape) {
    .photo-card-scene.entering { animation: slideInRight 0.25s ease-out forwards; }
    .photo-card-scene.exiting  { animation: slideOutRight 0.2s ease-in forwards; }
  }
  
  /* Portrait: slide from top */
  @media (orientation: portrait) {
    .photo-card-scene.entering { animation: slideInTop 0.25s ease-out forwards; }
    .photo-card-scene.exiting  { animation: slideOutTop 0.2s ease-in forwards; }
  }

  /* Photo Attach Button on Cards */
  .photo-attach-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #8b6f47;
    color: white;
    border: 2px solid #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  
  .photo-attach-btn:hover {
    background: #6d5736;
    transform: scale(1.1);
  }
  
  .photo-attach-btn.has-photo {
    background: #4CAF50;
  }

  /* Attached Photo Display */
  .card-photo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px 6px 10px 10px;
    pointer-events: none;
  }

  /* Photo Gallery Modal - Sliding Side Panel from LEFT */
  .photo-gallery-modal {
    position: fixed;
    top: 0;
    left: -100%;
    width: 280px;
    max-width: 75vw;
    height: 100%;
    background: white;
    z-index: 10000;
    transition: left 0.3s ease-out;
    box-shadow: 4px 0 12px rgba(0,0,0,0.2);
    overflow-y: auto;
  }
  
  .photo-gallery-modal.show {
    left: 0;
  }
  
  /* Push main content when gallery opens */
  .container {
    transition: transform 0.3s ease-out;
  }
  
  .container.gallery-open {
    transform: translateX(280px);
  }
  
  @media (max-width: 768px) {
    .container.gallery-open {
      transform: translateX(75vw);
    }
  }
  
  .photo-gallery-content {
    padding: 16px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  
  .gallery-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid #e0e0e0;
    flex-shrink: 0;
  }
  
  .gallery-title {
    font-size: 1rem;
    font-weight: bold;
    color: #8b6f47;
  }
  
  .gallery-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    color: #999;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  
  .gallery-close:hover {
    background: #f0f0f0;
  }
  
  .gallery-words-container {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start; /* Align bubbles to left, not stretched */
  }
  
  .word-bubble {
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
    border: 2px solid #8b6f47;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; /* Fit to content width */
    align-items: center;
    width: auto; /* Don't stretch to full width */
    min-width: auto;
  }
  
  .word-bubble:hover {
    transform: translateX(4px);
    box-shadow: -2px 2px 6px rgba(139, 111, 71, 0.2);
    background: linear-gradient(135deg, #e8d4b8 0%, #d8c4a8 100%);
  }
  
  .word-bubble-text {
    font-size: 0.95rem;
    font-weight: 700;
    color: #8b6f47;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  
  .word-bubble-delete {
    display: none; /* Hidden - not needed */
  }
  
  .gallery-empty {
    text-align: center;
    padding: 40px 16px;
    color: #999;
    font-size: 0.85rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <!-- Photo Gallery Side Panel -->
  <div class="photo-gallery-modal" id="photoGalleryModal">
    <div class="photo-gallery-content">
      <div class="gallery-header">
        <div class="gallery-title">Photo Gallery</div>
        <button class="gallery-close" onclick="closePhotoGallery()">×</button>
      </div>
      <div class="gallery-words-container" id="galleryWordsContainer"></div>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <div class="top-bar">
      <!-- Photo Gallery Button -->
      <button class="settings-btn" onclick="openPhotoGallery()" aria-label="Photo Gallery" style="margin-right: auto;">
        📷
      </button>

      <!-- Settings gear -->
      <div class="settings-dropdown" id="settingsDropdown">
        <button class="settings-btn" onclick="toggleSettings()" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="settings-panel" id="settingsPanel">
          <div class="settings-title">Settings</div>

          <!-- Case toggle row -->
          <div class="settings-row">
            <span class="settings-label">Letter Case</span>
            <button class="settings-toggle-btn" id="caseToggleBtn" onclick="toggleCase()">aa</button>
          </div>

          <!-- Photo card row -->
          <div class="settings-row">
            <span class="settings-label">Photo Card</span>
            <button class="settings-toggle-btn" id="photoToggleBtn" onclick="togglePhotoCard()">Off</button>
          </div>
        </div>
      </div>

      <!-- Existing mode/reset dropdown -->
      <div class="dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown()">⋯</button>
        <div class="dropdown-content" id="dropdownContent">
          <button onclick="handleMenuItem('cvc')">CVC</button>
          <button onclick="handleMenuItem('short-a')">Short Vowel "a"</button>
          <button onclick="handleMenuItem('reset')">Reset All</button>
          <button onclick="handleMenuItem('about')">About</button>
        </div>
      </div>
    </div>
    <div class="cards-container">
      <div id="photoCardContainer" class="photo-card-container"></div>
      <div class="cards-wrapper" id="cardsWrapper"></div>
    </div>
  </div>

  <script>
    const consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'q', 'r', 's', 't', 'v', 'w', 'x', 'y', 'z'];
    const vowels = ['a', 'e', 'i', 'o', 'u'];
    
    // Case toggle functionality
    const CASE_MODES = ['lower', 'UPPER', 'Sentence'];
    let currentCaseMode = 0;

    function applyCaseTransform(text, cardIndex) {
      const mode = CASE_MODES[currentCaseMode];
      if (mode === 'lower') {
        return text.toLowerCase();
      } else if (mode === 'UPPER') {
        return text.toUpperCase();
      } else if (mode === 'Sentence') {
        // Only capitalize the first card (index 0)
        if (cardIndex === 0) {
          return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
        } else {
          return text.toLowerCase();
        }
      }
      return text;
    }

    // Photo attachment functions
    function getCurrentWord() {
      // Get current word blend from all cards
      return gameState.cards.map(card => {
        const letter = card.letters[card.currentIndex];
        return applyCaseTransform(letter, 0).toLowerCase(); // Always use lowercase for storage key
      }).join('');
    }

    function attachPhotoToCurrentWord() {
      const word = getCurrentWord();
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            wordPhotos[word] = event.target.result;
            renderCards(); // Re-render to show photo
          };
          reader.readAsDataURL(file);
        }
      };
      input.click();
    }

    function openPhotoGallery() {
      const modal = document.getElementById('photoGalleryModal');
      const container = document.getElementById('galleryWordsContainer');
      const mainContainer = document.getElementById('mainContainer');
      
      container.innerHTML = '';
      
      const photoWords = Object.keys(wordPhotos);
      
      if (photoWords.length === 0) {
        container.innerHTML = '<div class="gallery-empty">No photos attached yet.<br><br>Turn on Photo Card and attach photos to word blends.</div>';
      } else {
        // Sort words alphabetically
        photoWords.sort((a, b) => a.localeCompare(b));
        
        photoWords.forEach(word => {
          const bubble = document.createElement('div');
          bubble.className = 'word-bubble';
          
          // Click bubble to navigate to word
          bubble.onclick = () => {
            navigateToWord(word);
            closePhotoGallery();
          };
          
          // Word text with case transform
          const wordText = document.createElement('div');
          wordText.className = 'word-bubble-text';
          
          // Apply case transform based on current mode
          let displayWord = word;
          if (CASE_MODES[currentCaseMode] === 'lower') {
            displayWord = word.toLowerCase();
          } else if (CASE_MODES[currentCaseMode] === 'UPPER') {
            displayWord = word.toUpperCase();
          } else if (CASE_MODES[currentCaseMode] === 'Sentence') {
            displayWord = word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
          }
          
          wordText.textContent = displayWord;
          bubble.appendChild(wordText);
          container.appendChild(bubble);
        });
      }
      
      // Slide panel in and push main content
      modal.classList.add('show');
      mainContainer.classList.add('gallery-open');
    }

    function navigateToWord(targetWord) {
      // Split target word into individual letters
      const targetLetters = targetWord.toLowerCase().split('');
      
      // Navigate each card to the corresponding letter
      gameState.cards.forEach((card, cardIndex) => {
        if (cardIndex < targetLetters.length) {
          const targetLetter = targetLetters[cardIndex];
          const letterIndex = card.letters.indexOf(targetLetter);
          
          if (letterIndex !== -1) {
            card.currentIndex = letterIndex;
            card.flippedCards = []; // Clear flipped stack when jumping
          }
        }
      });
      
      renderCards();
    }

    function closePhotoGallery() {
      const modal = document.getElementById('photoGalleryModal');
      const mainContainer = document.getElementById('mainContainer');
      
      modal.classList.remove('show');
      mainContainer.classList.remove('gallery-open');
    }

    function toggleSettings() {
      const sd = document.getElementById('settingsDropdown');
      const panel = document.getElementById('settingsPanel');
      sd.classList.toggle('open');
      
      // If opening, adjust position based on available space
      if (sd.classList.contains('open')) {
        setTimeout(() => {
          const panelRect = panel.getBoundingClientRect();
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          
          // Check if panel is cut off on the right
          if (panelRect.right > viewportWidth) {
            panel.style.left = 'auto';
            panel.style.right = '0';
          }
          
          // Check if panel is cut off on the bottom
          if (panelRect.bottom > viewportHeight) {
            panel.style.top = 'auto';
            panel.style.bottom = 'calc(100% + 6px)';
          }
          
          // In landscape mode, check vertical position
          if (window.matchMedia('(orientation: landscape)').matches) {
            if (panelRect.right > viewportWidth) {
              panel.style.left = 'auto';
              panel.style.right = 'calc(100% + 6px)';
            }
          }
        }, 10);
      } else {
        // Reset to default positioning when closing
        panel.style.left = '';
        panel.style.right = '';
        panel.style.top = '';
        panel.style.bottom = '';
      }
    }

    function toggleCase() {
      currentCaseMode = (currentCaseMode + 1) % CASE_MODES.length;
      updateCaseButton();
      renderCards();
    }

    function updateCaseButton() {
      const btn = document.getElementById('caseToggleBtn');
      const labels = ['aa', 'AA', 'Aa'];
      btn.textContent = labels[currentCaseMode];
    }
    
    let gameState = {
      mode: 'cvc',
      cards: [
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] },
        { type: 'vowel', letters: vowels, currentIndex: 0, label: 'Vowel', flippedCards: [] },
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] }
      ]
    };

    let photoCardVisible = false;
    const wordPhotos = {}; // Store photos by word blend (e.g., "bat", "cat", "am")

    function togglePhotoCard() {
      const btn = document.getElementById('photoToggleBtn');
      const photoContainer = document.getElementById('photoCardContainer');

      if (!photoCardVisible) {
        photoCardVisible = true;
        btn.textContent = 'On';
        btn.classList.add('active');
        photoContainer.classList.add('visible');
        appendPhotoCard(photoContainer, true);
      } else {
        const existing = photoContainer.querySelector('.photo-card-scene');
        if (existing) {
          existing.classList.remove('entering');
          existing.classList.add('exiting');
          setTimeout(() => { 
            if (existing.parentNode) existing.parentNode.removeChild(existing);
            photoContainer.classList.remove('visible');
          }, 200);
        }
        photoCardVisible = false;
        btn.textContent = 'Off';
        btn.classList.remove('active');
      }
    }

    function appendPhotoCard(wrapper, animate) {
      const scene = document.createElement('div');
      scene.className = 'photo-card-scene' + (animate ? ' entering' : '');

      const card = document.createElement('div');
      card.className = 'photo-card';

      // Get current word
      const currentWord = gameState.cards.map((c, i) => {
        const letter = c.letters[c.currentIndex];
        return applyCaseTransform(letter, 0).toLowerCase();
      }).join('');

      // Check if current word has a photo
      if (wordPhotos[currentWord]) {
        // Display existing photo
        const img = document.createElement('img');
        img.src = wordPhotos[currentWord];
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.style.borderRadius = '10px';
        card.appendChild(img);
        
        // Add delete button (hidden by default)
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'photo-attach-btn has-photo';
        deleteBtn.textContent = '×';
        deleteBtn.style.fontSize = '24px';
        deleteBtn.style.display = 'none'; // Hidden by default
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          if (confirm(`Delete photo for "${currentWord}"?`)) {
            delete wordPhotos[currentWord];
            renderCards();
          }
        };
        card.appendChild(deleteBtn);
        
        // Show delete button when photo card is clicked
        card.style.cursor = 'pointer';
        card.onclick = () => {
          // Toggle delete button visibility
          if (deleteBtn.style.display === 'none') {
            deleteBtn.style.display = 'flex';
          } else {
            deleteBtn.style.display = 'none';
          }
        };
      } else {
        // Show attach button
        const plus = document.createElement('div');
        plus.className = 'photo-card-plus';
        plus.textContent = '+';

        const inner = document.createElement('div');
        inner.className = 'photo-card-label-inner';
        inner.textContent = 'Photo';

        card.appendChild(plus);
        card.appendChild(inner);
        
        // Detect device type
        const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
        
        // Paste area in bottom-right corner (all devices)
        const pasteArea = document.createElement('div');
        pasteArea.className = 'photo-paste-area';
        pasteArea.innerHTML = `
          <div class="photo-paste-icon">📋</div>
          <div class="photo-paste-text">Paste</div>
        `;
        
        // Long-press detection for Apple devices
        let longPressTimer;
        let pressStartTime;
        
        pasteArea.addEventListener('touchstart', (e) => {
          if (isApple) {
            pressStartTime = Date.now();
            longPressTimer = setTimeout(() => {
              // After 500ms hold, try to trigger native paste
              e.target.focus();
              document.execCommand('paste');
            }, 500);
          }
        });
        
        pasteArea.addEventListener('touchend', (e) => {
          if (isApple) {
            clearTimeout(longPressTimer);
            const pressDuration = Date.now() - pressStartTime;
            
            // If it was a quick tap (< 500ms), open file picker
            if (pressDuration < 500) {
              e.preventDefault();
              e.stopPropagation();
              attachPhotoToCurrentWord();
            }
          }
        });
        
        pasteArea.addEventListener('touchcancel', () => {
          if (isApple) {
            clearTimeout(longPressTimer);
          }
        });
        
        // Click handler for non-touch devices (PC)
        pasteArea.onclick = async (e) => {
          e.stopPropagation();
          
          if (!isApple) {
            // PC/Android: Try clipboard paste
            const pasted = await tryPasteImage();
            if (!pasted) {
              alert('No image in clipboard. Please copy an image first.');
            }
          }
          // Apple devices handled by touch events above
        };
        
        card.appendChild(pasteArea);
        
        // Make main card area clickable for file upload
        card.style.cursor = 'pointer';
        card.onclick = (e) => {
          // Don't trigger if clicking paste area
          if (!e.target.closest('.photo-paste-area')) {
            attachPhotoToCurrentWord();
          }
        };
      }

      scene.appendChild(card);
      wrapper.appendChild(scene);
    }

    async function tryPasteImage() {
      try {
        // Request clipboard permission explicitly
        const permission = await navigator.permissions.query({ name: 'clipboard-read' });
        
        if (permission.state === 'denied') {
          return false;
        }

        // Try modern Clipboard API
        const clipboardItems = await navigator.clipboard.read();
        
        for (const item of clipboardItems) {
          for (const type of item.types) {
            if (type.startsWith('image/')) {
              const blob = await item.getType(type);
              const reader = new FileReader();
              
              reader.onload = (event) => {
                const currentWord = getCurrentWord();
                wordPhotos[currentWord] = event.target.result;
                renderCards();
              };
              
              reader.readAsDataURL(blob);
              return true; // Successfully pasted
            }
          }
        }
        return false; // No image in clipboard
      } catch (err) {
        console.log('Paste failed:', err.message);
        return false;
      }
    }

    async function pasteImageFromClipboard() {
      const pasted = await tryPasteImage();
      if (!pasted) {
        // Show platform-specific message
        const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
        
        if (isApple) {
          alert('Paste not available on this device.\n\nPlease use the + Photo area to upload images from your Photos app instead.');
        } else {
          alert('No image in clipboard.\n\nPlease copy an image first, or use the + Photo area to upload.');
        }
      }
    }

    function toggleDropdown() {
      const dropdown = document.querySelector('.dropdown');
      const content = document.getElementById('dropdownContent');
      content.classList.toggle('show');
      dropdown.classList.toggle('active');
    }

    function handleMenuItem(action) {
      const dropdown = document.querySelector('.dropdown');
      const content = document.getElementById('dropdownContent');
      content.classList.remove('show');
      dropdown.classList.remove('active');
      
      switch(action) {
        case 'cvc':
          setCVCMode();
          break;
        case 'short-a':
          setShortVowelA();
          break;
        case 'reset':
          resetAllCards();
          break;
        case 'about':
          alert('FlashABC - Notebook Flip Card Builder\nVersion 1.0\n\nClick cards to flip through letters!');
          break;
      }
    }

    function setCVCMode() {
      gameState.mode = 'cvc';
      gameState.cards = [
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] },
        { type: 'vowel', letters: vowels, currentIndex: 0, label: 'Vowel', flippedCards: [] },
        { type: 'consonant', letters: consonants, currentIndex: 0, label: 'Consonant', flippedCards: [] }
      ];
      renderCards();
    }

    function setShortVowelA() {
      gameState.mode = 'short-a';
      gameState.cards = [
        { type: 'consonant', letters: ['a','b','c','d','e','f','g','h','i','j','k','l','m','n','o','p','q','r','s','t','u','v','w','x','y','z'], currentIndex: 0, label: 'Letter', flippedCards: [] },
        { type: 'word-ending', letters: ['am', 'ad', 'at', 'an', 'ap', 'ab', 'ack', 'ant', 'ang', 'ank', 'amp'], currentIndex: 0, label: 'Word Ending', isWide: true, flippedCards: [] }
      ];
      renderCards();
    }

    function resetAllCards() {
      gameState.cards.forEach(card => {
        card.currentIndex = 0;
        card.flippedCards = [];
      });
      renderCards();
    }

    function renderCards() {
      const wrapper = document.getElementById('cardsWrapper');
      wrapper.innerHTML = '';

      gameState.cards.forEach((cardData, cardIndex) => {
        const scene = document.createElement('div');
        scene.className = 'card-scene';
        
        // Binding rings
        const binding = document.createElement('div');
        binding.className = 'binding';
        binding.innerHTML = '<div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>';
        
        // Container for stacked flipped cards
        const flippedStack = document.createElement('div');
        flippedStack.className = 'flipped-stack';
        if (cardData.isWide) flippedStack.classList.add('wide');
        
        // Add all previously flipped cards to the stack
        if (cardData.flippedCards && cardData.flippedCards.length > 0) {
          cardData.flippedCards.forEach((letter, index) => {
            const flippedCard = document.createElement('div');
            flippedCard.className = 'flipped-card';
            if (cardData.isWide) {
              flippedCard.classList.add('wide');
            }
            // No text content - just blank card
            flippedCard.style.zIndex = 100 + index;
            flippedStack.appendChild(flippedCard);
          });
        }
        
        const letters = cardData.letters;
        const currentIndex = cardData.currentIndex;
        const nextIndex = (currentIndex + 1) % letters.length;
        
        // Preview card (shows next letter underneath)
        const previewCard = document.createElement('div');
        previewCard.className = `preview-card ${cardData.type}`;
        if (cardData.isWide) {
          previewCard.classList.add('wide');
        }
        previewCard.textContent = applyCaseTransform(letters[nextIndex], cardIndex);
        
        // Notebook (current active card)
        const notebook = document.createElement('div');
        notebook.className = `notebook ${cardData.type}`;
        if (cardData.isWide) {
          notebook.classList.add('wide');
        }
        
        // Front face (current letter)
        const faceFront = document.createElement('div');
        faceFront.className = 'face face-front';
        faceFront.textContent = applyCaseTransform(letters[currentIndex], cardIndex);
        
        // Back face (next letter)
        const faceBack = document.createElement('div');
        faceBack.className = 'face face-back';
        faceBack.textContent = applyCaseTransform(letters[nextIndex], cardIndex);
        
        notebook.appendChild(faceFront);
        notebook.appendChild(faceBack);
        
        // Label
        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = cardData.label;
        
        scene.appendChild(flippedStack);
        scene.appendChild(binding);
        scene.appendChild(previewCard);
        scene.appendChild(notebook);
        scene.appendChild(label);
        
        // Click on flipped stack to go backwards
        flippedStack.onclick = (e) => {
          e.stopPropagation();
          if (cardData.flippedCards && cardData.flippedCards.length > 0) {
            flipCardBackward(cardIndex);
          }
        };
        
        // Touch on flipped stack for mobile
        flippedStack.addEventListener('touchstart', (e) => {
          e.stopPropagation(); // prevent scene touchstart from treating this as a forward-flip gesture
        });

        flippedStack.addEventListener('touchend', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (cardData.flippedCards && cardData.flippedCards.length > 0) {
            flipCardBackward(cardIndex);
          }
        });
        
        // Touch/Swipe handling
        let touchStartY = 0;
        let touchEndY = 0;
        let touchStartTime = 0;
        let isSwiping = false;
        let touchStartedOnStack = false;
        
        scene.addEventListener('touchstart', (e) => {
          touchStartedOnStack = flippedStack.contains(e.target);
          touchStartY = e.touches[0].clientY;
          touchStartTime = performance.now();
          isSwiping = false;
        });
        
        scene.addEventListener('touchmove', (e) => {
          isSwiping = true;
        });
        
        scene.addEventListener('touchend', (e) => {
          if (touchStartedOnStack) return; // handled by flippedStack listener
          touchEndY = e.changedTouches[0].clientY;
          const touchEndTime = performance.now();
          
          if (isSwiping) {
            handleSwipe(cardIndex, notebook, touchStartY, touchEndY, touchStartTime, touchEndTime);
          } else {
            // Single tap without swipe - flip forward
            e.preventDefault();
            flipCardForward(cardIndex, notebook);
          }
        });
        
        // Click to flip forward (for desktop)
        scene.onclick = (e) => {
          if (!e.defaultPrevented) {
            flipCardForward(cardIndex, notebook);
          }
        };
        
        wrapper.appendChild(scene);
      });

      // Update photo card if visible (separate container)
      if (photoCardVisible) {
        const photoContainer = document.getElementById('photoCardContainer');
        const existingPhoto = photoContainer.querySelector('.photo-card-scene');
        if (existingPhoto) {
          photoContainer.removeChild(existingPhoto);
        }
        appendPhotoCard(photoContainer, false);
      }
    }

    function handleSwipe(cardIndex, notebook, startY, endY, startTime, endTime) {
      const swipeDistance = startY - endY;
      const minSwipeDistance = 50;
      
      if (Math.abs(swipeDistance) > minSwipeDistance) {
        // Calculate swipe velocity (pixels per millisecond)
        const swipeTime = endTime - startTime;
        const velocity = Math.abs(swipeDistance) / swipeTime;
        
        // Map velocity to animation duration
        // Fast swipe (velocity > 2) = 200ms
        // Medium swipe (velocity 0.5-2) = 300ms
        // Slow swipe (velocity < 0.5) = 380ms
        let duration = 380;
        if (velocity > 2) {
          duration = 200;
        } else if (velocity > 0.5) {
          duration = 300;
        }
        
        if (swipeDistance > 0) {
          // Swipe up - go forward
          flipCardForward(cardIndex, notebook, duration);
        } else {
          // Swipe down - go backward
          flipCardBackward(cardIndex, duration);
        }
      }
    }

    let lastFlipTime = 0;
    const lastClickTimes = {}; // Track last click time per card
    // Track which cards are mid-animation to prevent double-taps
    const animatingCards = new Set();

    // ── Smooth rAF-driven arc animation ──────────────────────────────────────
    // Easing: ease-in-out sine — slow start, fast through binding, slow landing
    function easeInOutSine(t) {
      return -(Math.cos(Math.PI * t) - 1) / 2;
    }

    // Animate a flying card rotating around transform-origin:top center.
    // fromDeg → toDeg over durationMs.
    // onFrame(currentDeg) called each frame; onDone() called when finished.
    function animateFlyCard(flyCard, fromDeg, toDeg, durationMs, onFrame, onDone) {
      const startTime = performance.now();
      function frame(now) {
        const elapsed = now - startTime;
        const rawT = Math.min(elapsed / durationMs, 1);
        const easedT = easeInOutSine(rawT);
        const deg = fromDeg + (toDeg - fromDeg) * easedT;
        flyCard.style.transform = `rotateX(${deg}deg)`;
        onFrame(deg);
        if (rawT < 1) {
          requestAnimationFrame(frame);
        } else {
          onDone();
        }
      }
      requestAnimationFrame(frame);
    }

    function makeFlyCard(card, cardH, letter, cardIndex) {
      const flyCard = document.createElement('div');
      flyCard.className = `flying-card ${card.type}`;
      if (card.isWide) flyCard.classList.add('wide');
      flyCard.style.height = cardH + 'px';
      flyCard.style.top = '0px';

      // Letter label inside — shown/hidden based on angle in the rAF loop
      const letterEl = document.createElement('span');
      letterEl.className = 'fly-letter';
      letterEl.textContent = letter ? applyCaseTransform(letter, cardIndex) : '';
      flyCard.appendChild(letterEl);

      return flyCard;
    }

    function flipCardForward(cardIndex, notebook, duration) {
      if (animatingCards.has(cardIndex)) return;
      animatingCards.add(cardIndex);
      
      const now = performance.now();
      
      // If duration not provided (from swipe), calculate based on click speed
      if (duration === undefined) {
        const timeSinceLastClick = lastClickTimes[cardIndex] ? now - lastClickTimes[cardIndex] : 1000;
        lastClickTimes[cardIndex] = now;
        
        // Rapid clicking (< 400ms) = faster animation
        if (timeSinceLastClick < 400) {
          duration = 200;
        } else {
          duration = 380;
        }
      }
      
      lastClickTimes[cardIndex] = now;

      const card = gameState.cards[cardIndex];
      const currentLetter = card.letters[card.currentIndex];
      const nextIndex = (card.currentIndex + 1) % card.letters.length;
      const nextLetter = card.letters[nextIndex];
      const afterNextIndex = (nextIndex + 1) % card.letters.length;
      const afterNextLetter = card.letters[afterNextIndex];
      const scene = notebook.closest('.card-scene');
      const cardH = notebook.offsetHeight;

      // Pre-update the static scene to its post-flip state so renderCards()
      // causes zero visible snap when the flying card lands
      const previewCard = scene.querySelector('.preview-card');
      const faceFront   = scene.querySelector('.face-front');
      if (faceFront)   faceFront.textContent   = applyCaseTransform(nextLetter, cardIndex);
      if (previewCard) previewCard.textContent = applyCaseTransform(afterNextLetter, cardIndex);

      // Forward: show letter below binding (0→90°), hide above (90→180°)
      const flyCard = makeFlyCard(card, cardH, currentLetter, cardIndex);
      const letterEl = flyCard.querySelector('.fly-letter');
      flyCard.style.transform = 'rotateX(0deg)';
      scene.appendChild(flyCard);

      animateFlyCard(flyCard, 0, 180, duration, (deg) => {
        // Hide letter once card passes the binding (90°)
        letterEl.style.visibility = deg < 90 ? 'visible' : 'hidden';
      }, () => {
        if (flyCard.parentNode) flyCard.parentNode.removeChild(flyCard);

        if (!card.flippedCards) card.flippedCards = [];
        card.flippedCards.push(currentLetter);
        card.currentIndex = (card.currentIndex + 1) % card.letters.length;
        if (card.currentIndex === 0) card.flippedCards = [];

        animatingCards.delete(cardIndex);
        renderCards();
      });
    }

    function flipCardBackward(cardIndex, duration) {
      if (animatingCards.has(cardIndex)) return;
      const card = gameState.cards[cardIndex];
      if (!card.flippedCards || card.flippedCards.length === 0) return;

      animatingCards.add(cardIndex);
      
      const now = performance.now();
      
      // If duration not provided (from swipe), calculate based on click speed
      if (duration === undefined) {
        const timeSinceLastClick = lastClickTimes[cardIndex] ? now - lastClickTimes[cardIndex] : 1000;
        lastClickTimes[cardIndex] = now;
        
        // Rapid clicking (< 400ms) = faster animation
        if (timeSinceLastClick < 400) {
          duration = 200;
        } else {
          duration = 320;
        }
      }
      
      lastClickTimes[cardIndex] = now;

      const wrapper = document.getElementById('cardsWrapper');
      const scenes = wrapper.querySelectorAll('.card-scene');
      const scene = scenes[cardIndex];
      const notebook = scene ? scene.querySelector('.notebook') : null;

      if (notebook && scene) {
        const cardH = notebook.offsetHeight;

        const returningLetter = card.flippedCards[card.flippedCards.length - 1];

        // Scene stays completely frozen during the animation.
        // Only update state + re-render once the card has fully landed.
        const flyCard = makeFlyCard(card, cardH, returningLetter, cardIndex);
        const letterEl = flyCard.querySelector('.fly-letter');
        letterEl.style.visibility = 'hidden';
        flyCard.style.transform = 'rotateX(180deg)';
        scene.appendChild(flyCard);

        animateFlyCard(flyCard, 180, 0, duration, (deg) => {
          letterEl.style.visibility = deg < 90 ? 'visible' : 'hidden';
        }, () => {
          if (flyCard.parentNode) flyCard.parentNode.removeChild(flyCard);

          const lastFlipped = card.flippedCards.pop();
          const letterIndex = card.letters.indexOf(lastFlipped);
          if (letterIndex !== -1) card.currentIndex = letterIndex;

          animatingCards.delete(cardIndex);
          renderCards();
        });
      } else {
        const lastFlipped = card.flippedCards.pop();
        const letterIndex = card.letters.indexOf(lastFlipped);
        if (letterIndex !== -1) card.currentIndex = letterIndex;
        animatingCards.delete(cardIndex);
        renderCards();
      }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.dropdown')) {
        document.getElementById('dropdownContent').classList.remove('show');
        document.querySelector('.dropdown').classList.remove('active');
      }
      if (!event.target.closest('.settings-dropdown')) {
        document.getElementById('settingsDropdown').classList.remove('open');
      }
    });

    document.addEventListener('touchend', function(event) {
      if (!event.target.closest('.dropdown')) {
        document.getElementById('dropdownContent').classList.remove('show');
        document.querySelector('.dropdown').classList.remove('active');
      }
      if (!event.target.closest('.settings-dropdown')) {
        document.getElementById('settingsDropdown').classList.remove('open');
      }
    });

    // Initial render
    renderCards();

    // Warn before leaving to prevent accidental exits
    window.addEventListener('beforeunload', function(event) {
      // Always show confirmation when trying to leave
      event.preventDefault();
      
      // Custom message based on whether there are photos
      const hasPhotos = Object.keys(wordPhotos).length > 0;
      const confirmationMessage = hasPhotos 
        ? 'You have unsaved photos. Are you sure you want to leave?' 
        : 'Are you sure you want to leave?';
      
      event.returnValue = confirmationMessage;
      return confirmationMessage;
    });

    // Global paste event listener for catching native paste from iOS context menu
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      
      if (items) {
        for (let i = 0; i < items.length; i++) {
          if (items[i].type.startsWith('image/')) {
            e.preventDefault();
            const blob = items[i].getAsFile();
            const reader = new FileReader();
            
            reader.onload = (event) => {
              const currentWord = getCurrentWord();
              wordPhotos[currentWord] = event.target.result;
              renderCards();
            };
            
            reader.readAsDataURL(blob);
            break;
          }
        }
      }
    });
  </script>
</body>
</html>
